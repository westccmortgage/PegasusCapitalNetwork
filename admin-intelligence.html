Pegasus.boot(async ()=>{

// ── GATE (layer 1: local store — instant redirect for signed-out users) ─────

var _isLive  = _st.mode === 'live';
if(!_isLive)  { location.replace('/signin.html'); return; }

const v = Pegasus.mountApp({active:'Capital Intelligence Admin', title:'Capital Intelligence',

// ── GATE (layer 2: LIVE database re-check — never trust a stale cache).
// Resolves the caller's tier: 'admin' (full) or 'analyst' (read + manual edit).
// Non-staff are redirected. Even if both gates were bypassed, every pci_ table
// is protected by RLS and the import functions require full admin server-side.
var access = await window.PegIntelAPI.verifyStaff();
if(!access.role){ location.replace('/dashboard.html'); return; }

PegIntel.mount(v, access);
});
