Pegasus.boot(async ()=>{

// ── ADMIN GATE (layer 1: local store — instant redirect for non-admins) ─────
var _st = window.PegStore && window.PegStore.get ? window.PegStore.get() : {};
var _isLive  = _st.mode === 'live';
var _isAdmin = window.PegStore && typeof window.PegStore.isAdmin === 'function'
               ? window.PegStore.isAdmin()
               : (_st.profile && _st.profile.role === 'admin');
if(!_isLive)  { location.replace('/signin.html'); return; }
if(!_isAdmin) { location.replace('/dashboard.html'); return; }

const v = Pegasus.mountApp({active:'Partner Network Admin', title:'California Partner Network',

// ── ADMIN GATE (layer 2: LIVE database re-check — never trust a stale cache).
// Even if both gates were bypassed, every pn_ table is admin-only via RLS.

if(!liveAdmin){ location.replace('/dashboard.html'); return; }

PegPartner.mount(v);
});
