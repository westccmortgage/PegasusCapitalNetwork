fields:[[['Full Name','Jordan Maxwell','text',null,'bp_name'],['Work Email','you@firm.com','text',null,'bp_email']],[['Company','Acme Holdings','text',null,'bp_co'],['Badge Type','','select',['Member','Verified Lender','RWA Partner','Funding Provider'],'bp_btype']],[['Placement Type','','select',['Website Footer','About Page','Email Signature','Social Profile'],'bp_ptype'],['Placement URL','https://...','text',null,'bp_url']],[['Date Placed','','text',null,'bp_date'],['Disclosure Visible?','','select',['yes','no'],'bp_disc']],[['Notes','Any context for the review team','area',null,'bp_notes']]],submit:'Submit for Verification →'}));
