<script>
const v=Pegasus.mountApp({active:'Intelligence',title:'Capital Strategy Simulator',sub:'Model financing scenarios'});
v.insertAdjacentHTML('beforeend','<div class="grid" style="grid-template-columns:1fr 1.2fr"><div class="card"><div class="card-head"><div class="card-title">Scenario</div></div><div class="card-body" id="in"></div></div><div id="out"></div></div>');
document.getElementById('in').innerHTML='<div class="field"><label class="label">Purchase Price</label><input class="input input-mono" id="pp" value="7250000"></div><div class="field"><label class="label">Target Leverage (LTV %)</label><input class="input input-mono" id="lv" value="75"></div><div class="field"><label class="label">Equity Available</label><input class="input input-mono" id="eq" value="2000000"></div><div class="field"><label class="label">Strategy</label><select class="input" id="st"><option>Bridge-to-Perm</option><option>Construction-to-Perm</option><option>Cash-out Refi</option></select></div><button class="btn btn-pri" style="width:100%;justify-content:center" onclick="sim()">Simulate →</button>';
window.sim=function(){var pp=+pp_.value,lv=+lv_.value/100,eq=+eq_.value;var debt=pp*lv;var need=pp-debt;var gap=need-eq;
document.getElementById('out').innerHTML='<div class="grid g2" style="gap:14px">'+[['Senior Debt','$'+Math.round(debt).toLocaleString(),'var(--blue-lt)'],['Equity Needed','$'+Math.round(need).toLocaleString(),'var(--teal)'],['Equity Gap',(gap>0?'$'+Math.round(gap).toLocaleString():'Fully covered'),gap>0?'var(--amber)':'var(--green)'],['Leverage',(lv*100).toFixed(0)+'%','var(--gold)']].map(function(m){return '<div class="stat" style="--accent:'+m[2]+'"><div class="stat-v" style="color:'+m[2]+';font-size:20px">'+m[1]+'</div><div class="stat-l">'+m[0]+'</div></div>';}).join('')+'</div><div class="card" style="margin-top:14px"><div class="card-body"><div style="font-size:12px;color:var(--text2);line-height:1.6">'+(gap>0?'This scenario needs <b style="color:var(--amber)">$'+Math.round(gap).toLocaleString()+'</b> in additional equity or mezzanine. The Match Engine can surface mezz/preferred-equity partners.':'Your equity covers the gap. This is a financeable structure for senior debt partners in the network.')+'</div><a class="btn btn-ghost btn-sm" style="margin-top:12px" href="/match-engine.html">Find Capital Partners →</a></div></div>';};
var pp_=document.getElementById('pp'),lv_=document.getElementById('lv'),eq_=document.getElementById('eq');sim();
</script></body></html>
