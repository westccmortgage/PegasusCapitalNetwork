<script>
const v=Pegasus.mountApp({active:'Intelligence',title:'Deal Analyzer',sub:'DSCR · debt yield · leverage'});
v.insertAdjacentHTML('beforeend','<div class="grid" style="grid-template-columns:1fr 1fr"><div class="card"><div class="card-head"><div class="card-title">Inputs</div></div><div class="card-body" id="in"></div></div><div id="out"></div></div>');
document.getElementById('in').innerHTML='<div class="row2"><div class="field"><label class="label">NOI (annual)</label><input class="input input-mono" id="noi" value="520000"></div><div class="field"><label class="label">Loan Amount</label><input class="input input-mono" id="loan" value="5800000"></div></div><div class="row2"><div class="field"><label class="label">Rate %</label><input class="input input-mono" id="rate" value="10.25"></div><div class="field"><label class="label">Amort (yrs)</label><input class="input input-mono" id="amort" value="30"></div></div><div class="field"><label class="label">Property Value</label><input class="input input-mono" id="val" value="7250000"></div><button class="btn btn-pri" style="width:100%;justify-content:center" onclick="calc()">Analyze →</button>';
window.calc=function(){var noi=+noi_.value,loan=+loan_.value,r=+rate_.value/100/12,n=+amort_.value*12,val=+val_.value;var pmt=loan*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);var ads=pmt*12;var dscr=noi/ads;var dy=noi/loan*100;var ltv=loan/val*100;
document.getElementById('out').innerHTML='<div class="grid g2" style="gap:14px">'+[['DSCR',dscr.toFixed(2),dscr>=1.25?'var(--green)':dscr>=1.1?'var(--amber)':'var(--red)',dscr>=1.25?'Strong':dscr>=1.1?'Acceptable':'Below threshold'],['Debt Yield',dy.toFixed(1)+'%',dy>=9?'var(--green)':'var(--amber)',dy>=9?'Above floor':'Watch'],['LTV',ltv.toFixed(1)+'%',ltv<=75?'var(--green)':'var(--amber)',ltv<=75?'Conservative':'Leveraged'],['Annual Debt Svc','$'+Math.round(ads).toLocaleString(),'var(--blue-lt)','P&I']].map(function(m){return '<div class="stat" style="--accent:'+m[2]+'"><div class="stat-v" style="color:'+m[2]+'">'+m[1]+'</div><div class="stat-l">'+m[0]+'</div><div class="stat-m" style="color:'+m[2]+'">'+m[3]+'</div></div>';}).join('')+'</div><div class="card" style="margin-top:14px"><div class="card-body"><div style="font-size:12px;color:var(--text2);line-height:1.6">🧠 At a DSCR of <b style="color:var(--text)">'+dscr.toFixed(2)+'</b> and debt yield of <b style="color:var(--text)">'+dy.toFixed(1)+'%</b>, this deal '+(dscr>=1.25&&dy>=9?'screens well against typical lender thresholds.':'may require structure adjustments to meet lender minimums.')+'</div></div></div>';};
var noi_=document.getElementById('noi'),loan_=document.getElementById('loan'),rate_=document.getElementById('rate'),amort_=document.getElementById('amort'),val_=document.getElementById('val');calc();
</script></body></html>
