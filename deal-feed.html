<script>
const v=Pegasus.mountApp({active:'Intelligence',title:'Deal Feed',sub:'Live marketplace activity'});
(async function(){try{
    var c=await window.PegSB.ready;
    var counts=[['—','Open Requests','var(--blue)'],['—','In Matching','var(--teal)'],['—','Funded · 7d','var(--green)'],['—','Volume · 30d','var(--gold)']];
    if(c){
      var [{count:open},{count:matching}]=await Promise.all([c.from('financing_requests').select('*',{count:'exact',head:true}).eq('status','submitted'),c.from('match_results').select('*',{count:'exact',head:true})]);
      counts[0][0]=String(open||0); counts[1][0]=String(matching||0);
    }
    v.insertAdjacentHTML('beforeend','<div class="grid g4" style="margin-bottom:16px">'+counts.map(function(s){return '<div class="stat" style="--accent:'+s[2]+'"><div class="stat-v">'+s[0]+'</div><div class="stat-l">'+s[1]+'</div></div>';}).join('')+'</div>');
  }catch(e){v.insertAdjacentHTML('beforeend','<div style="padding:12px;font-size:12px;color:var(--text3)">Platform metrics load from Supabase.</div>');}})();
let h='<div class="card"><div class="card-head"><div class="card-title">⟳ Capital Flow · Live</div><span class="badge b-active">● Streaming</span></div><div class="card-body" style="padding:0">';
h+=PEG_DATA.activity.map(a=>'<div style="display:flex;gap:12px;align-items:flex-start;padding:14px 18px;border-bottom:1px solid var(--border)"><div style="width:7px;height:7px;border-radius:50%;background:'+a.c+';margin-top:6px;flex-shrink:0"></div><div style="flex:1"><div style="font-size:12px;color:var(--text2);line-height:1.5">'+a.x+'</div><div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:3px">'+a.m+'</div></div><span class="tag '+a.tag[1]+'">'+a.tag[0]+'</span></div>').join('');
h+='</div></div>';v.insertAdjacentHTML('beforeend',h);
</script></body></html>
