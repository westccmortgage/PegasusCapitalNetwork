<!DOCTYPE html><html lang="en"><head><title>Reset Password — Pegasus Network</title>
<link rel="canonical" href="https://pegasuscapitalnetwork.com/forgot-password.html"><meta name="robots" content="noindex,nofollow"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="/css/pegasus.css"><link rel="icon" href="/assets/brand/favicon.ico" sizes="any"><link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/icon-32.png"><link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png"><link rel="manifest" href="/site.webmanifest"><meta name="theme-color" content="#08111C"></head><body>
<script src="/js/pegasus-config.js"></script>
<script src="/js/pegasus-supabase.js"></script>
<script src="/js/pegasus-entitlements.js"></script>
<script src="/js/pegasus-data.js"></script>
<script src="/js/pegasus-content.js"></script>
<script src="/js/pegasus-match.js"></script>
<script src="/js/pegasus-store.js"></script>
<script src="/js/pegasus-api.js"></script>
<script src="/js/pegasus-forms.js"></script>
<script src="/js/pegasus-auth.js"></script>
<script src="/js/pegasus-core.js"></script>
<script src="/js/pegasus-billing.js"></script>
<script src="/js/pegasus-pages.js"></script>
<script>
Pegasus.mountPublic('');
var main=document.createElement('main'); main.className='fade'; document.body.appendChild(main);
main.innerHTML='<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px">'
  +'<div class="auth-card"><div class="auth-head"><div class="auth-icon">🔑</div>'
  +'<div class="auth-title">Reset your password</div>'
  +'<div class="auth-sub">Enter your email and we\'ll send a reset link to your inbox.</div></div>'
  +'<div class="auth-body">'
  +'<div class="field"><label class="label" for="rp_em">Work Email</label><input class="input" type="email" id="rp_em" placeholder="you@firm.com"></div>'
  +'<div id="rp_err" style="color:var(--red);font-size:11px;font-family:var(--mono);min-height:14px"></div>'
  +'<button class="btn btn-pri" id="rp_btn" style="width:100%;justify-content:center;margin-top:4px" onclick="window.doReset()">Send Reset Link →</button>'
  +'<div id="rp_sent" style="display:none;text-align:center;padding:14px 0;font-size:13px;color:var(--green)">✓ Reset link sent — check your inbox.</div>'
  +'<a class="auth-alt" href="/signin.html">← Back to Sign In</a>'
  +'</div></div></div>';
var f=document.createElement('div'); f.innerHTML=Pegasus.footer(); document.body.appendChild(f.firstElementChild);
window.doReset=async function(){
  var em=document.getElementById('rp_em').value.trim();
  var err=document.getElementById('rp_err'); err.textContent='';
  if(!em||!em.includes('@')){err.textContent='Please enter a valid email address.';return;}
  var btn=document.getElementById('rp_btn'); btn.disabled=true; btn.textContent='Sending…';
  try{
    var c=await window.PegSB.ready;
    if(c){ var {error}=await c.auth.resetPasswordForEmail(em,{redirectTo:location.origin+'/reset-password.html'}); if(error) throw error; }
    document.getElementById('rp_sent').style.display='block'; btn.style.display='none';
    document.getElementById('rp_em').disabled=true;
  }catch(e){ err.textContent=(e&&e.message)||'Could not send reset link. Please try again.'; btn.disabled=false; btn.textContent='Send Reset Link →'; }
};
document.title='Reset Password — Pegasus Network';
</script></body></html>
