<style>
.intent-wrap{max-width:520px;margin:32px auto;padding:0 16px}
.intent-head{text-align:center;margin-bottom:24px}
.intent-ic{font-size:36px;margin-bottom:10px}
.intent-list{display:flex;flex-direction:column;gap:10px}
.intent-opt{width:100%;display:flex;align-items:center;gap:16px;padding:16px 18px;
  background:var(--bg);border:1px solid var(--border);border-radius:14px;
  cursor:pointer;text-align:left;transition:border-color .15s,background .15s}
.intent-opt:hover,.intent-opt:active{border-color:var(--blue);background:rgba(34,113,195,0.05)}
.intent-opt-ic{font-size:26px;flex-shrink:0;width:36px;text-align:center}
.intent-opt-body{flex:1;min-width:0}
.intent-opt-t{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.intent-opt-s{font-size:12px;color:var(--text3);line-height:1.4}
.intent-opt-arr{font-size:18px;color:var(--text3);flex-shrink:0}
.intent-skip{display:block;width:100%;text-align:center;margin-top:18px;padding:12px;
  background:transparent;border:none;color:var(--text3);font-size:13px;cursor:pointer;text-decoration:none}
.intent-skip:hover{color:var(--text2)}
</style>

<script src="/js/activation.js"></script>
<script>
Pegasus.boot(async ()=>{ await (async function(){
  await PegActivation.mount();
  var v=document.getElementById('pegView');
  if(v && !v.querySelector('[data-pegasus-redeem]')){
    // Post-signup access-code field: lets Google OAuth users (who
    // skip the signup access-code box) and any user with an upgrade
    // code activate / upgrade without going through Stripe.
    v.insertAdjacentHTML('afterbegin',
      '<div data-pegasus-redeem data-title="Have an invitation or upgrade code?" '+
      'data-sub="Activate your Pegasus tier instantly. Works for Google OAuth signups too."></div>');
    if(window.PegAccessRedeemWidget) PegAccessRedeemWidget.autoMount();
  }
})(); });
</script></body></html>
