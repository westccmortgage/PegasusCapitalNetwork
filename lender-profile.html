<script>

function mapProfile(p, tier){
  return {
    n: p.full_name||p.display_name||'Member',
    r: (p.role||'Member').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),
    i: (p.full_name||'M').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),
    av: p.avatar_color||'linear-gradient(135deg,#112244,#2271C3)',
    company: p.company_name||p.company||null,
    market: p.market||p.markets_served||null,
    since: p.member_since||(p.created_at?p.created_at.slice(0,7):null),
    completion: p.profile_completion||null,
    verified: !!p.verified,
    featured: p.featured_kind||null,
    title: p.professional_title||null,
    headline: p.headline||null,
    currentFocus: p.current_focus||null,
    bio: p.bio||null,
    tags: (p.specialties||(p.tags||[])),
    credentials: p.credentials||[],
    detailTitle: 'Profile',
    details: [
      p.role       && ['Role', (p.role||'').replace(/_/g,' ')],
      p.market     && ['Market', p.market],
      p.company_name && ['Company', p.company_name],
    ].filter(Boolean),
    activity: p.recent_activity||[],
    metrics: [],
    cta: 'Request Introduction',
    cta2: 'Save to Network',
    tier: tier
  };
}

Pegasus.boot(async ()=>{
  var id=new URLSearchParams(location.search).get('id');
  var m=null;
  if(id){
    try{
      var c=await window.PegSB.ready;
      if(c){
        var {data: prof}=await c.from('profiles').select('id,full_name,role,avatar_color,company_name,created_at,profile_completion,featured_kind,professional_title,headline,current_focus,bio,specialties,credentials,markets,location,website,verification_status,profile_slug').eq('id',id).maybeSingle();
        if(prof) m=mapProfile(prof,'');
      }
    }catch(e){}
  }
  PegPages.mountContent('lender-profile',()=>m?PegPages.profileBody(m):PegPages.profileEmpty(id));
  document.title=(m?m.n+' — ':'')+'Lender Profile — Pegasus Network';
});
</script></body></html>
