<!DOCTYPE html>
<html lang="en">
<head>
<title>Pegasus Members Network</title>
<link rel="canonical" href="https://pegasuscapitalnetwork.com/members.html"><meta property="og:type" content="website"><meta property="og:site_name" content="Pegasus Capital Network"><meta property="og:title" content="Pegasus Members Network"><meta property="og:description" content="A private connection board for capital, real estate, and growth professionals on Pegasus."><meta property="og:url" content="https://pegasuscapitalnetwork.com/members.html"><meta property="og:image" content="https://pegasuscapitalnetwork.com/assets/brand/og-default.png"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="Pegasus Members Network"><meta name="twitter:description" content="A private connection board for capital, real estate, and growth professionals on Pegasus."><meta name="twitter:image" content="https://pegasuscapitalnetwork.com/assets/brand/og-default.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Browse capital, real estate, and growth professionals on Pegasus. Build a connection board and send connection requests.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/pegasus.css">
<link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#08111C">
<style>
/* ─── Connection Board layout ────────────────────────────────────────────── */
.cb-shell{max-width:1240px;margin:0 auto;padding:var(--sp-lg) var(--sp-lg) var(--sp-3xl)}
.cb-head{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--sp-lg);margin:var(--sp-xs) 0 var(--sp-lg);flex-wrap:wrap}
.cb-head h1{font-family:var(--serif);font-weight:400;font-size:clamp(24px,2.6vw,32px);color:var(--text);margin:0;letter-spacing:-.015em}
.cb-head p{font-size:13px;color:var(--text3);margin:4px 0 0;max-width:640px;line-height:1.6}
.cb-grid{display:grid;grid-template-columns:minmax(0,30fr) minmax(0,70fr);gap:var(--sp-lg);align-items:start}
@media(max-width:980px){.cb-grid{grid-template-columns:1fr}}

/* ─── Left column — discovery ────────────────────────────────────────────── */
.cb-disc{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);display:flex;flex-direction:column;min-height:420px;max-height:78vh;overflow:hidden;box-shadow:var(--sh-card)}
.cb-disc-top{padding:14px 16px;border-bottom:1px solid var(--border)}
.cb-search{display:flex;align-items:center;gap:var(--sp-sm);background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:10px 13px;margin-bottom:10px;transition:border-color var(--dur-fast)}
.cb-search:focus-within{border-color:var(--blue)}
.cb-search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13.5px}
.cb-search .ic{color:var(--text3);font-size:14px}
.cb-pills{display:flex;flex-wrap:wrap;gap:6px}
.cb-pill{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:5px 11px;border-radius:20px;cursor:pointer;transition:all var(--dur-fast)}
.cb-pill:hover{border-color:var(--border2);color:var(--text)}
.cb-pill.on{background:var(--blue-dim);border-color:rgba(29,90,158,.30);color:var(--blue)}
.cb-list{flex:1;overflow-y:auto;padding:6px 6px 8px}
.cb-row{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r2);cursor:pointer;transition:background var(--dur-fast)}
.cb-row:hover{background:var(--bg2)}
.cb-row.is-selected{background:var(--blue-dim);outline:1px solid rgba(29,90,158,.25)}
.cb-row.is-me{opacity:.5;cursor:not-allowed}
.cb-av{width:38px;height:38px;border-radius:var(--r2);flex:none;background:linear-gradient(135deg,#162E52,#1D5A9E);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;overflow:hidden}
.cb-av img{width:100%;height:100%;object-fit:cover}
.cb-row-body{flex:1;min-width:0}
.cb-row-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb-row-role{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.cb-row-status{display:flex;align-items:center;gap:6px;font-size:9px;font-family:var(--mono);color:var(--text4);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.cb-row-status .d{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(12,143,92,0.35)}
.cb-row-tag{font-size:9.5px;font-family:var(--mono);padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text2);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex:none}
.cb-row-tag.is-sent{background:rgba(142,112,32,.12);color:var(--gold)}
.cb-row-tag.is-conn{background:rgba(12,143,92,.08);color:var(--green)}
.cb-row-tag.is-in{background:var(--blue-dim);color:var(--blue)}
.cb-empty{padding:var(--sp-lg) var(--sp-lg);text-align:center;color:var(--text3);font-size:12.5px}
.cb-disc-foot{padding:9px 14px;border-top:1px solid var(--border);font-size:11px;font-family:var(--mono);letter-spacing:.06em;color:var(--text3);display:flex;justify-content:space-between;align-items:center}

/* ─── Right column — connection board ────────────────────────────────────── */
.cb-board{display:flex;flex-direction:column;gap:var(--sp-md)}
.cb-me{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);padding:18px 20px;box-shadow:var(--sh-card)}
.cb-me-top{display:flex;align-items:center;gap:14px}
.cb-me-av{width:56px;height:56px;border-radius:var(--r3);flex:none;background:linear-gradient(135deg,#162E52,#1D5A9E);color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;font-family:var(--serif);overflow:hidden}
.cb-me-av img{width:100%;height:100%;object-fit:cover}
.cb-me-name{font-family:var(--serif);font-weight:400;font-size:20px;color:var(--text);letter-spacing:-.015em;line-height:1.15}
.cb-me-role{font-size:12.5px;color:var(--text2);margin-top:2px}
.cb-me-focus{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.55}
.cb-me-tiles{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.cb-me-tile{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r1);padding:4px 9px 4px 4px;text-decoration:none;color:var(--text);transition:border-color var(--dur-fast)}
.cb-me-tile:hover{border-color:var(--border2)}
.cb-me-tile-lg{width:22px;height:22px;border-radius:var(--r1);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2);overflow:hidden}
.cb-me-tile-lg img{width:100%;height:100%;object-fit:cover}
.cb-me-tile-nm{font-size:11.5px;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb-me-actions{display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}

.cb-hint{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);padding:20px 22px;box-shadow:var(--sh-card)}
.cb-hint-h{font-family:var(--serif);font-size:19px;font-weight:400;color:var(--text);margin-bottom:8px}
.cb-hint-p{font-size:12.5px;color:var(--text3);line-height:1.6}
.cb-hint-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.cb-hint-pill{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:5px 11px;border-radius:20px;cursor:pointer;transition:all var(--dur-fast)}
.cb-hint-pill:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}

.cb-sel{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh-card);transition:box-shadow var(--dur-normal) var(--ease-out)}
.cb-sel:hover{box-shadow:var(--sh-raise)}
.cb-sel-head{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;transition:background var(--dur-fast)}
.cb-sel-head:hover{background:var(--bg2)}
.cb-sel-av{width:36px;height:36px;border-radius:var(--r2);flex:none;background:var(--blue-dim);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;overflow:hidden}
.cb-sel-av img{width:100%;height:100%;object-fit:cover}
.cb-sel-body{flex:1;min-width:0}
.cb-sel-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb-sel-sub{font-size:11px;color:var(--text3);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb-sel-state{font-size:9px;font-family:var(--mono);letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:var(--bg2);color:var(--text3)}
.cb-sel-state.is-sent{background:rgba(142,112,32,.12);color:var(--gold)}
.cb-sel-state.is-conn{background:rgba(12,143,92,.08);color:var(--green)}
.cb-sel-state.is-in{background:var(--blue-dim);color:var(--blue)}
.cb-sel-x{border:none;background:none;color:var(--text4);cursor:pointer;font-size:14px;width:28px;height:28px;border-radius:var(--r1);transition:all var(--dur-fast)}
.cb-sel-x:hover{background:var(--bg2);color:var(--text2)}
.cb-sel-exp{padding:0 14px 16px;border-top:1px solid var(--border);display:none}
.cb-sel.expanded .cb-sel-exp{display:block}
.cb-sel-exp .field{margin:10px 0 0}
.cb-sel-exp .lbl{font-size:9px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.cb-sel-exp .val{font-size:12.5px;color:var(--text2);line-height:1.6}
.cb-sel-exp .actions{display:flex;gap:var(--sp-sm);flex-wrap:wrap;margin-top:14px}

/* ─── Connect modal ──────────────────────────────────────────────────────── */
.cn-scrim{position:fixed;inset:0;background:rgba(8,12,18,.55);backdrop-filter:blur(12px);z-index:1100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.cn-modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--r5);width:100%;max-width:480px;box-shadow:var(--sh-float);overflow:hidden;animation:cnPop var(--dur-normal) var(--ease-out)}
@keyframes cnPop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.cn-head{padding:20px 24px;border-bottom:1px solid var(--border)}
.cn-title{font-family:var(--serif);font-size:21px;font-weight:400;color:var(--text);margin:0;letter-spacing:-.015em}
.cn-sub{font-size:12.5px;color:var(--text3);line-height:1.55;margin:4px 0 0}
.cn-body{padding:16px 24px 8px}
.cn-body label{display:block;font-size:10px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:14px 0 6px}
.cn-body select,.cn-body textarea{width:100%;padding:10px 13px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:13.5px;font-family:inherit;outline:none;transition:border-color var(--dur-fast)}
.cn-body select:focus,.cn-body textarea:focus{border-color:var(--blue)}
.cn-body textarea{min-height:96px;resize:vertical;line-height:1.55}
.cn-foot{display:flex;justify-content:flex-end;gap:9px;padding:16px 24px 20px}
.cn-err{font-size:11.5px;color:var(--gold);margin:8px 24px 0;line-height:1.5}

/* ─── Guest fallback (anonymous visitor) ─────────────────────────────────── */
.cb-guest{max-width:760px;margin:var(--sp-3xl) auto;text-align:center;padding:var(--sp-xl)}
.cb-guest h2{font-family:var(--serif);font-weight:400;font-size:32px;color:var(--text);margin:0 0 12px;letter-spacing:-.015em}
.cb-guest p{color:var(--text2);font-size:14px;line-height:1.65;margin:0 auto 24px;max-width:540px}
/* ─── Daily Signal composer ──────────────────────────────────────────────── */
.cb-sig{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r3);padding:16px 18px;box-shadow:var(--sh-card)}
.cb-sig-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.cb-sig-t{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--text)}
.cb-sig-sub{font-size:9px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text4)}
.cb-sig-hint{font-size:11.5px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.cb-sig-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cb-sig-chip{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--bg2);color:var(--text3);cursor:pointer;transition:all var(--dur-fast)}
.cb-sig-chip:hover{border-color:var(--border2);color:var(--text2)}
.cb-sig-chip.on{background:var(--blue-dim);border-color:rgba(29,90,158,.3);color:var(--blue)}
.cb-sig-ta{width:100%;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;color:var(--text);font-family:inherit;font-size:13px;line-height:1.5;resize:vertical;min-height:58px;outline:none;transition:border-color var(--dur-fast)}
.cb-sig-ta:focus{border-color:var(--blue)}
.cb-sig-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:10px}
.cb-sig-count{font-size:10px;font-family:var(--mono);color:var(--text4)}
.cb-sig-list{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:11px}
.cb-sig-item{display:flex;gap:9px;align-items:flex-start}
.cb-sig-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);margin-top:6px;flex:none}
.cb-sig-body{flex:1;min-width:0}
.cb-sig-txt{font-size:12.5px;color:var(--text);line-height:1.5;word-break:break-word}
.cb-sig-meta{font-size:9.5px;font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase;color:var(--text4);margin-top:3px}
.cb-sig-x{border:none;background:none;color:var(--text4);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:var(--r1);flex:none}
.cb-sig-x:hover{background:var(--bg2);color:var(--text2)}
.cb-sig-err{font-size:11px;color:var(--gold);margin-top:8px;min-height:13px}
</style>
</head>
<body>
<div id="nav"></div>

<div class="cb-shell" id="cbShell" style="display:none">
  <div class="cb-head">
    <div>
      <h1>Pegasus Members Network</h1>
      <p>On the left, discover people inside Pegasus. On the right, build your connection board — select members, expand their cards, and send a request to connect.</p>
    </div>
  </div>

  <div class="cb-grid">
    <!-- LEFT: discovery -->
    <div class="cb-disc" id="cbDisc">
      <div class="cb-disc-top">
        <div class="cb-search">
          <span class="ic">⌕</span>
          <input id="cbSearch" type="text" placeholder="Search by name, role, company, or market…">
        </div>
        <div class="cb-pills" id="cbPills"></div>
      </div>
      <div class="cb-list" id="cbList"><div class="cb-empty">Loading network…</div></div>
      <div class="cb-disc-foot"><span id="cbCount">—</span><span>Click to add to board</span></div>
    </div>

    <!-- RIGHT: connection board -->
    <div class="cb-board" id="cbBoard">
      <div id="cbMe"></div>
      <div id="cbSignal"></div>
      <div id="cbHint"></div>
      <div id="cbSelected"></div>
    </div>
  </div>
</div>

<div id="footer"></div>

<script src="/js/pegasus-config.js"></script>
<script src="/js/pegasus-supabase.js"></script>
<script src="/js/pegasus-entitlements.js"></script>
<script src="/js/pegasus-data.js"></script>
<script src="/js/pegasus-content.js"></script>
<script src="/js/pegasus-match.js"></script>
<script src="/js/pegasus-store.js"></script>
<script src="/js/pegasus-api.js"></script>
<script src="/js/pegasus-forms.js"></script>
<script src="/js/pegasus-auth.js"></script>
<script src="/js/pegasus-core.js"></script>
<script src="/js/pegasus-billing.js"></script>
<script src="/js/pegasus-pages.js"></script>
<script>
Pegasus.boot(async function(){
  Pegasus.mountPublic('Members');
  document.getElementById('footer').outerHTML = Pegasus.footer();

  var esc=Pegasus.esc;
  function initials(n){ var w=(n||'?').trim().split(/\s+/); return ((w[0]?w[0][0]:'')+(w[1]?w[1][0]:'')).toUpperCase()||'•'; }
  function avHTML(av,name,cls){ cls=cls||''; return av ? '<img src="'+esc(av)+'" alt="">' : esc(initials(name)); }

  var ROLE_LABELS={borrower:'Growth Partner',lender:'Lender',broker:'Broker',agent:'Real Estate Professional',investor:'Capital Partner',developer:'Developer',rwa_partner:'RWA Partner',business_funding_provider:'Business Funding Provider',insurance:'Insurance Partner',ecosystem_member:'Ecosystem Member',member:'Member'};
  function roleLabel(r){ r=(r||'').toLowerCase(); return ROLE_LABELS[r] || (r||'member').replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}); }

  var INTENTS=[
    ['business_connection','Explore a business connection'],
    ['capital_financing','Discuss capital / financing'],
    ['real_estate_opportunity','Discuss real estate opportunity'],
    ['professional_introduction','Referral / professional introduction'],
    ['partnership','Partnership conversation'],
    ['general_networking','General networking'],
    ['other','Other']
  ];

  /* ── Anonymous? render a brief sign-in prompt and stop ──────────────────── */
  var sb = null; try{ sb = await window.PegSB.ready; }catch(e){}
  var session=null;
  try{ var sres = sb ? await sb.auth.getSession() : null; session = sres && sres.data && sres.data.session; }catch(e){}
  if(!session){
    var shell=document.getElementById('cbShell');
    if(shell){
      shell.style.display='';
      shell.innerHTML='<div class="cb-guest"><h2>Inside the Pegasus Members Network</h2>'+
        '<p>A private connection board of capital, real estate, and growth professionals. Sign in to discover members, build your board, and send connection requests. Member names and contact details stay private until you join.</p>'+
        '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
          '<a class="btn btn-pri btn-lg" href="/signup.html">Create Free Profile</a>'+
          '<a class="btn btn-ghost btn-lg" href="/signin.html">Sign In</a>'+
        '</div></div>';
    }
    return;
  }
  var MY_UID = session.user.id;

  /* Clean failure surface — never a blank page or raw SQL for normal members.
     Admins additionally see the technical detail so they can diagnose. */
  function failState(detail){
    var isAdm=false; try{ isAdm = Pegasus.store && Pegasus.store.isAdmin && Pegasus.store.isAdmin(); }catch(_){}
    var shell=document.getElementById('cbShell');
    if(!shell) return;
    shell.style.display='';
    shell.innerHTML='<div class="cb-guest"><h2>The Members Network is briefly unavailable</h2>'+
      '<p>We could not load the network right now. This is on our side, not yours — please refresh in a moment. If it keeps happening, contact the Pegasus team.</p>'+
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
        '<button class="btn btn-pri btn-lg" onclick="location.reload()">Refresh</button>'+
        '<a class="btn btn-ghost btn-lg" href="/dashboard.html">Go to Workspace</a>'+
      '</div>'+
      (isAdm && detail ? '<div style="margin-top:22px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);font-family:var(--mono);font-size:11px;color:var(--text3);text-align:left;max-width:560px;margin-left:auto;margin-right:auto">Admin detail: '+esc(String(detail))+'</div>' : '')+
      '</div>';
  }

  /* ── Load members + my profile + relationship states (parallel-safe) ───── */
  var profilesRes;
  try{
    profilesRes = await sb.from('profiles')
      .select('id,full_name,role,headline,bio,professional_title,company_name,markets,specialties,avatar_url,profile_slug,profile_completion,reviewed_by_pegasus,location,updated_at')
      .not('full_name','is',null)
      .order('reviewed_by_pegasus',{ascending:false,nullsFirst:false})
      .order('profile_completion',{ascending:false,nullsFirst:false})
      .order('updated_at',{ascending:false,nullsFirst:false})
      .limit(400);
  }catch(e){ failState(e && e.message); return; }
  if(profilesRes && profilesRes.error){ failState(profilesRes.error.message || profilesRes.error.code); return; }
  var ALL = (profilesRes.data || []).filter(function(p){ return p.full_name && p.full_name.trim(); });
  var ME = ALL.filter(function(m){ return m.id===MY_UID; })[0] || null;

  /* States: { otherUserId → 'connected'|'request_sent'|'request_received'|'declined'|'dismissed' } */
  var STATES = {};
  try{
    var co = await sb.rpc('get_my_connections');
    if(co && !co.error && Array.isArray(co.data)) co.data.forEach(function(c){
      var slug=c.profile_slug;
      var other = ALL.filter(function(p){return p.profile_slug===slug;})[0];
      if(other) STATES[other.id]='connected';
    });
  }catch(e){}
  try{
    var sent = await sb.rpc('get_my_connection_requests',{p_box:'sent'});
    if(sent && !sent.error && Array.isArray(sent.data)) sent.data.forEach(function(r){
      var slug=r.other && r.other.profile_slug; if(!slug) return;
      var other=ALL.filter(function(p){return p.profile_slug===slug;})[0]; if(!other) return;
      if(r.status==='pending' && !STATES[other.id]) STATES[other.id]='request_sent';
      else if(r.status==='accepted') STATES[other.id]='connected';
    });
  }catch(e){}
  try{
    var inbox = await sb.rpc('get_my_connection_requests',{p_box:'inbox'});
    if(inbox && !inbox.error && Array.isArray(inbox.data)) inbox.data.forEach(function(r){
      var slug=r.other && r.other.profile_slug; if(!slug) return;
      var other=ALL.filter(function(p){return p.profile_slug===slug;})[0]; if(!other) return;
      if(r.status==='pending' && !STATES[other.id]) STATES[other.id]='request_received';
      else if(r.status==='accepted') STATES[other.id]='connected';
    });
  }catch(e){}

  /* Show the shell now that everything is ready */
  document.getElementById('cbShell').style.display='';

  /* ── RIGHT COLUMN: my profile card ─────────────────────────────────────── */
  function profilePath(p){ return p.profile_slug ? '/u/'+p.profile_slug : '/public-profile.html?id='+p.id; }
  async function renderMe(){
    var host=document.getElementById('cbMe'); if(!host) return;
    if(!ME){
      host.innerHTML='<div class="cb-me"><div class="cb-me-name">Finish your Pegasus profile</div>'+
        '<div class="cb-me-focus">Add your name, role, and a short focus so other members can discover you.</div>'+
        '<div class="cb-me-actions"><a class="btn btn-pri btn-sm" href="/profile-edit.html">Complete My Profile</a></div></div>';
      return;
    }
    var av = ME.avatar_url ? '<img src="'+esc(ME.avatar_url)+'" alt="">' : esc(initials(ME.full_name));
    var role = esc(ME.professional_title || roleLabel(ME.role));
    var loc = esc((ME.markets&&ME.markets[0]) || ME.location || '');
    var focus = esc(ME.headline || (ME.bio?String(ME.bio).slice(0,140):''));
    var complete = (ME.profile_completion||0) >= 80;
    var primary = complete
      ? '<a class="btn btn-pri btn-sm" href="'+profilePath(ME)+'">View My Full Profile</a>'
      : '<a class="btn btn-pri btn-sm" href="/profile-edit.html">Complete My Profile</a>';
    host.innerHTML=
      '<div class="cb-me">'+
        '<div class="cb-me-top"><div class="cb-me-av">'+av+'</div>'+
          '<div><div class="cb-me-name">'+esc(ME.full_name)+'</div>'+
            '<div class="cb-me-role">'+role+(loc?(' · '+loc):'')+'</div></div></div>'+
        (focus?'<div class="cb-me-focus">'+focus+'</div>':'')+
        '<div class="cb-me-tiles" id="cbMeTiles"></div>'+
        '<div class="cb-me-actions">'+primary+
          '<a class="btn btn-ghost btn-sm" href="/profile-edit.html">Manage Profile</a>'+
          '<a class="btn btn-ghost btn-sm" href="/my-presences.html">Business Pages</a>'+
        '</div>'+
        (complete?'':'<div class="cb-me-focus" style="margin-top:10px;color:var(--text4)">No rush — you can complete your full profile (bio, specialties, business pages) anytime.</div>')+
      '</div>';

    /* Connected business tiles (public-safe RPC) */
    if(ME.profile_slug){
      try{
        var br = await sb.rpc('get_profile_business_pages_by_slug',{p_profile_slug:ME.profile_slug});
        var biz = (br&&!br.error&&Array.isArray(br.data)) ? br.data : [];
        var t=document.getElementById('cbMeTiles');
        if(t && biz.length){
          t.innerHTML = biz.slice(0,4).map(function(b){
            var lg = b.logo ? '<img src="'+esc(b.logo)+'" alt="">' : esc((b.name||'?').slice(0,1).toUpperCase());
            return '<a class="cb-me-tile" href="'+Pegasus.presencePath(b.presence_type,b.slug)+'">'+
              '<span class="cb-me-tile-lg">'+lg+'</span>'+
              '<span class="cb-me-tile-nm">'+esc(b.name)+'</span></a>';
          }).join('');
        } else if(t){ t.remove(); }
      }catch(e){}
    }
  }

  /* ── HINT (default empty state under "My Profile") ─────────────────────── */
  function renderHint(){
    var hint=document.getElementById('cbHint');
    if(SELECTED.length){ hint.innerHTML=''; return; }
    var roles=[['investor','Capital Partners'],['developer','Developers'],['lender','Lenders'],['broker','Brokers'],['agent','Real Estate Agents']];
    hint.innerHTML='<div class="cb-hint">'+
      '<div class="cb-hint-h">Start building your connection board.</div>'+
      '<div class="cb-hint-p">Select members from the left to compare profiles, review their businesses, and decide who to connect with. Sending a connection request adds a short message; the member can accept, decline, or dismiss it.</div>'+
      '<div class="cb-hint-list">'+
        roles.map(function(r){return '<button class="cb-hint-pill" data-role="'+r[0]+'">'+esc(r[1])+'</button>';}).join('')+
      '</div></div>';
    hint.querySelectorAll('.cb-hint-pill').forEach(function(b){
      b.onclick=function(){ activeRole=b.getAttribute('data-role'); renderPills(); applyFilter(); };
    });
  }

  /* ── LEFT COLUMN: filters, search, list ────────────────────────────────── */
  var ROLES=[
    ['','All Roles'],
    ['investor','Capital Partners'],['lender','Lenders'],['broker','Brokers'],
    ['developer','Developers'],['agent','Real Estate Agents'],['borrower','Growth Partners'],
    ['rwa_partner','RWA Partners'],['business_funding_provider','Service Providers'],
    ['ecosystem_member','Ecosystem Members']
  ];
  var activeRole='', activeQuery='';
  function renderPills(){
    var host=document.getElementById('cbPills');
    host.innerHTML=ROLES.map(function(r){
      return '<button class="cb-pill'+(activeRole===r[0]?' on':'')+'" data-role="'+r[0]+'">'+esc(r[1])+'</button>';
    }).join('');
    host.querySelectorAll('.cb-pill').forEach(function(b){
      b.onclick=function(){ activeRole=b.getAttribute('data-role'); renderPills(); applyFilter(); };
    });
  }
  function listRow(p){
    var st = STATES[p.id];
    var tag = st==='connected'  ? '<span class="cb-row-tag is-conn">Connected</span>' :
              st==='request_sent'    ? '<span class="cb-row-tag is-sent">Request sent</span>' :
              st==='request_received'? '<span class="cb-row-tag is-in">Wants to connect</span>' :
              '';
    var isSelected = SELECTED.some(function(s){return s.id===p.id;});
    var isMe = p.id===MY_UID;
    var av = p.avatar_url ? '<img src="'+esc(p.avatar_url)+'" alt="">' : esc(initials(p.full_name));
    var meta = [roleLabel(p.role), p.company_name].filter(Boolean).join(' · ');
    var loc = (p.markets&&p.markets[0]) || p.location || '';
    var recently = p.updated_at && (new Date(p.updated_at).getTime() > Date.now() - 14*864e5);
    var status = recently ? '<div class="cb-row-status"><span class="d"></span>Recently active</div>' : '';
    return '<div class="cb-row'+(isSelected?' is-selected':'')+(isMe?' is-me':'')+'" data-id="'+esc(p.id)+'">'+
      '<div class="cb-av">'+av+'</div>'+
      '<div class="cb-row-body">'+
        '<div class="cb-row-name">'+esc(p.full_name)+(isMe?' <span style="color:var(--text4);font-size:10px;font-family:var(--mono)">(you)</span>':'')+'</div>'+
        '<div class="cb-row-role">'+esc(meta)+(loc?(' · '+esc(loc)):'')+'</div>'+
        status+
      '</div>'+
      tag+
    '</div>';
  }
  function applyFilter(){
    var q=(activeQuery||'').trim().toLowerCase();
    var rows=ALL.filter(function(p){
      if(activeRole && (p.role||'').toLowerCase()!==activeRole) return false;
      if(!q) return true;
      var hay=[p.full_name,p.role,p.headline,p.professional_title,p.company_name,(p.markets||[]).join(' '),(p.specialties||[]).join(' '),p.location].join(' ').toLowerCase();
      return hay.indexOf(q)>=0;
    });
    var host=document.getElementById('cbList');
    if(!rows.length){ host.innerHTML='<div class="cb-empty">No members match your search.</div>'; }
    else { host.innerHTML = rows.map(listRow).join(''); }
    host.querySelectorAll('.cb-row').forEach(function(el){
      el.onclick=function(){
        var id=el.getAttribute('data-id');
        if(id===MY_UID) return; /* never add yourself */
        var p=ALL.filter(function(x){return x.id===id;})[0]; if(!p) return;
        toggleSelect(p);
      };
    });
    document.getElementById('cbCount').textContent = rows.length + ' member' + (rows.length===1?'':'s');
  }
  document.getElementById('cbSearch').addEventListener('input', function(e){ activeQuery=e.target.value; applyFilter(); });
  renderPills();

  /* ── SELECTION / BOARD ────────────────────────────────────────────────── */
  var SELECTED = []; /* array of profiles */
  function selectedCard(p){
    var st=STATES[p.id];
    var av = p.avatar_url ? '<img src="'+esc(p.avatar_url)+'" alt="">' : esc(initials(p.full_name));
    var sub = [roleLabel(p.role), p.company_name].filter(Boolean).join(' · ');
    var loc = (p.markets&&p.markets[0]) || p.location || '';
    var stateLbl = st==='connected'  ? '<span class="cb-sel-state is-conn">Connected</span>' :
                   st==='request_sent' ? '<span class="cb-sel-state is-sent">Request sent</span>' :
                   st==='request_received' ? '<span class="cb-sel-state is-in">Wants to connect</span>' :
                   '<span class="cb-sel-state">Selected</span>';
    var btn = st==='connected'  ? '<button class="btn btn-ghost btn-sm" disabled>Connected</button>' :
              st==='request_sent' ? '<button class="btn btn-ghost btn-sm" disabled>Request sent</button>' :
              st==='request_received' ? '<a class="btn btn-pri btn-sm" href="/network-requests.html#connection-inbox">Respond in Workspace</a>' :
              '<button class="btn btn-pri btn-sm" data-act="connect" data-id="'+esc(p.id)+'">Connect</button>';
    var focus=esc(p.headline || (p.bio?String(p.bio).slice(0,200):''));
    var markets=(p.markets||[]).slice(0,4).map(esc).join(' · ');
    var specs=(p.specialties||[]).slice(0,4).map(esc).join(' · ');
    return '<div class="cb-sel" data-id="'+esc(p.id)+'">'+
      '<div class="cb-sel-head">'+
        '<div class="cb-sel-av">'+av+'</div>'+
        '<div class="cb-sel-body">'+
          '<div class="cb-sel-name">'+esc(p.full_name)+'</div>'+
          '<div class="cb-sel-sub">'+esc(sub)+(loc?(' · '+esc(loc)):'')+'</div>'+
        '</div>'+
        stateLbl+
        '<button class="cb-sel-x" data-act="remove" data-id="'+esc(p.id)+'" title="Remove from board" aria-label="Remove from board">✕</button>'+
      '</div>'+
      '<div class="cb-sel-exp">'+
        (focus?'<div class="field"><div class="lbl">Current focus</div><div class="val">'+focus+'</div></div>':'')+
        (markets?'<div class="field"><div class="lbl">Markets</div><div class="val">'+markets+'</div></div>':'')+
        (specs?'<div class="field"><div class="lbl">Specialties</div><div class="val">'+specs+'</div></div>':'')+
        '<div class="actions">'+
          '<a class="btn btn-ghost btn-sm" href="'+profilePath(p)+'">View Profile</a>'+
          btn+
          '<button class="btn btn-ghost btn-sm" data-act="collapse" data-id="'+esc(p.id)+'">Collapse</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }
  function renderSelected(){
    var host=document.getElementById('cbSelected');
    host.innerHTML = SELECTED.map(selectedCard).join('');
    host.querySelectorAll('.cb-sel').forEach(function(card){
      var head = card.querySelector('.cb-sel-head');
      head.addEventListener('click', function(e){
        if(e.target.closest('.cb-sel-x')) return; /* don't expand on remove */
        card.classList.toggle('expanded');
      });
      var collapse = card.querySelector('[data-act="collapse"]');
      if(collapse) collapse.addEventListener('click', function(e){ e.stopPropagation(); card.classList.remove('expanded'); });
      var rm = card.querySelector('[data-act="remove"]');
      if(rm) rm.addEventListener('click', function(e){ e.stopPropagation(); removeFromBoard(rm.getAttribute('data-id')); });
      var cn = card.querySelector('[data-act="connect"]');
      if(cn) cn.addEventListener('click', function(e){ e.stopPropagation(); openConnect(cn.getAttribute('data-id')); });
    });
    renderHint();
  }
  function toggleSelect(p){
    var idx = SELECTED.findIndex(function(s){return s.id===p.id;});
    if(idx>=0){
      /* already selected — just scroll to it (and expand) */
      var card=document.querySelector('.cb-sel[data-id="'+p.id+'"]');
      if(card){ card.classList.add('expanded'); card.scrollIntoView({behavior:'smooth',block:'center'}); }
    } else {
      SELECTED.unshift(p);
      renderSelected();
      applyFilter(); /* refresh selected highlight in left list */
    }
  }
  function removeFromBoard(id){
    SELECTED = SELECTED.filter(function(s){return s.id!==id;});
    renderSelected();
    applyFilter();
  }

  /* ── Connect modal ─────────────────────────────────────────────────────── */
  function openConnect(otherId){
    var p = ALL.filter(function(x){return x.id===otherId;})[0]; if(!p) return;
    var existing = STATES[p.id];
    if(existing==='connected'){ Pegasus.toast('✓','var(--green-dim)','Already connected', p.full_name); return; }
    if(existing==='request_sent'){ Pegasus.toast('◷','var(--blue-dim)','Request already sent', 'You can review it in your Workspace.'); return; }

    var optsHtml = INTENTS.map(function(i){return '<option value="'+i[0]+'">'+esc(i[1])+'</option>';}).join('');
    var scrim=document.createElement('div'); scrim.className='cn-scrim';
    scrim.innerHTML=
      '<div class="cn-modal" role="dialog" aria-label="Send connection request">'+
        '<div class="cn-head"><div class="cn-title">Connect with '+esc(p.full_name)+'</div>'+
          '<div class="cn-sub">Send a short note explaining why you want to connect. Pegasus shares your name and profile — your private contact details are never exposed.</div></div>'+
        '<div class="cn-body">'+
          '<label for="cnIntent">Intent / reason</label>'+
          '<select id="cnIntent">'+optsHtml+'</select>'+
          '<label for="cnMsg">Message</label>'+
          '<textarea id="cnMsg" maxlength="600" placeholder="Write a short note. Example: “I saw your profile and would like to connect about real estate finance opportunities in California.”"></textarea>'+
        '</div>'+
        '<div class="cn-err" id="cnErr" style="display:none"></div>'+
        '<div class="cn-foot"><button class="btn btn-ghost" id="cnCancel">Cancel</button>'+
          '<button class="btn btn-pri" id="cnSend">Send Connection Request</button></div>'+
      '</div>';
    document.body.appendChild(scrim);
    scrim.addEventListener('click', function(e){ if(e.target===scrim) close(); });
    function close(){ if(scrim.parentNode) scrim.parentNode.removeChild(scrim); }
    document.getElementById('cnCancel').onclick=close;
    document.addEventListener('keydown', function esc(e){ if(e.key==='Escape'){ close(); document.removeEventListener('keydown',esc);} });

    document.getElementById('cnSend').onclick=async function(){
      var btn=this; btn.disabled=true; btn.textContent='Sending…';
      var intent=document.getElementById('cnIntent').value;
      var msg=(document.getElementById('cnMsg').value||'').trim();
      try{
        var r = await sb.rpc('send_member_connection',{p_recipient_user_id:p.id, p_intent:intent, p_message:msg});
        if(r.error) throw r.error;
        var resp = r.data || {};
        if(!resp.ok){
          var err=document.getElementById('cnErr');
          err.style.display=''; err.textContent = resp.message || 'Could not send the request.';
          btn.disabled=false; btn.textContent='Send Connection Request';
          /* If the existing state explains the failure, sync local state. */
          if(resp.code==='already_sent') STATES[p.id]='request_sent';
          else if(resp.code==='incoming_pending') STATES[p.id]='request_received';
          else if(resp.code==='connected') STATES[p.id]='connected';
          return;
        }
        STATES[p.id]='request_sent';
        close();
        Pegasus.toast('✓','var(--green-dim)','Request sent', p.full_name+' will see your request in their bell and Workspace.');
        renderSelected();
        applyFilter();
      }catch(e){
        /* Never surface raw SQL to members. Show a clean message; admins also
           get the technical detail so they can open the Repair Center. */
        var isAdm=false; try{ isAdm = Pegasus.store && Pegasus.store.isAdmin && Pegasus.store.isAdmin(); }catch(_){}
        var friendly='We couldn’t send this request because the network system needs an update. Please contact the Pegasus administrator.';
        var err=document.getElementById('cnErr');
        err.style.display='';
        err.innerHTML = Pegasus.esc(friendly) + (isAdm && e && e.message ? '<br><span style="color:var(--text4)">Technical detail: '+Pegasus.esc(e.message)+'</span>' : '');
        btn.disabled=false; btn.textContent='Send Connection Request';
      }
    };
  }

  /* ── DAILY SIGNAL — short professional updates (degrades gracefully) ─────────
     If migration 064 (member_signals) is not applied, the RPCs are absent; we
     detect that and hide the whole section so nothing breaks. */
  var SIG_TYPES=[['working_on','Working on'],['seeking_intro','Who I want to meet'],['offering','What I’m offering'],['showcase','New showcase / opportunity'],['referral','Referral request']];
  var SIG_LBL={working_on:'Working on',seeking_intro:'Seeking intro',offering:'Offering',showcase:'Showcase',referral:'Referral',update:'Update'};
  var sigType='working_on';
  function rpcMissing(err){ var c=err&&(err.code||''); var m=(((err&&err.message)||'')+' '+((err&&err.details)||'')).toLowerCase(); return c==='PGRST202'||c==='404'||/does not exist|could not find the function|schema cache|not found/.test(m); }
  function sigAgo(ts){ try{ var d=Math.max(0,(Date.now()-new Date(ts).getTime())/1000); if(d<60)return 'just now'; if(d<3600)return Math.floor(d/60)+'m ago'; if(d<86400)return Math.floor(d/3600)+'h ago'; return Math.floor(d/86400)+'d ago'; }catch(e){ return ''; } }
  function sigItem(s){ return '<div class="cb-sig-item"><span class="cb-sig-dot"></span><div class="cb-sig-body"><div class="cb-sig-txt">'+esc(s.content)+'</div><div class="cb-sig-meta">'+esc(SIG_LBL[s.signal_type]||'Update')+' · '+esc(sigAgo(s.created_at))+'</div></div><button class="cb-sig-x" data-sid="'+esc(s.id)+'" title="Delete signal" aria-label="Delete signal">✕</button></div>'; }
  async function renderSignal(){
    var host=document.getElementById('cbSignal'); if(!host) return;
    if(!ME){ host.innerHTML=''; return; }
    var recent=[];
    try{
      var r=await sb.rpc('get_my_recent_signals',{p_limit:5});
      if(r && r.error){ if(rpcMissing(r.error)){ host.innerHTML=''; return; } }
      else if(r && Array.isArray(r.data)) recent=r.data;
    }catch(e){ host.innerHTML=''; return; }
    var chips=SIG_TYPES.map(function(s){return '<button class="cb-sig-chip'+(s[0]===sigType?' on':'')+'" data-t="'+s[0]+'">'+esc(s[1])+'</button>';}).join('');
    var list=recent.length?'<div class="cb-sig-list">'+recent.map(sigItem).join('')+'</div>':'';
    host.innerHTML='<div class="cb-sig">'+
      '<div class="cb-sig-h"><div class="cb-sig-t">Daily Signal</div><div class="cb-sig-sub">Shown on your profile</div></div>'+
      '<div class="cb-sig-hint">Share a short professional update — what you’re working on, who you want to meet, or what you’re offering.</div>'+
      '<div class="cb-sig-chips">'+chips+'</div>'+
      '<textarea class="cb-sig-ta" id="cbSigTa" maxlength="280" placeholder="e.g. Actively placing $2–5M bridge on value-add multifamily in the Southeast."></textarea>'+
      '<div class="cb-sig-foot"><span class="cb-sig-count" id="cbSigCount">0 / 280</span><button class="btn btn-pri btn-sm" id="cbSigPost">Post Signal</button></div>'+
      '<div class="cb-sig-err" id="cbSigErr"></div>'+list+'</div>';
    host.querySelectorAll('.cb-sig-chip').forEach(function(b){ b.onclick=function(){ sigType=b.getAttribute('data-t'); host.querySelectorAll('.cb-sig-chip').forEach(function(x){x.classList.toggle('on',x===b);}); }; });
    var ta=document.getElementById('cbSigTa'), cnt=document.getElementById('cbSigCount');
    if(ta&&cnt) ta.addEventListener('input',function(){ cnt.textContent=ta.value.length+' / 280'; });
    var post=document.getElementById('cbSigPost');
    if(post) post.onclick=async function(){
      var txt=(ta.value||'').trim(); var err=document.getElementById('cbSigErr');
      if(!txt){ err.textContent='Write a short update first.'; return; }
      post.disabled=true; post.textContent='Posting…'; err.textContent='';
      try{
        var rr=await sb.rpc('post_member_signal',{p_type:sigType,p_content:txt});
        if(rr.error) throw rr.error;
        var resp=rr.data||{};
        if(!resp.ok){ err.textContent=resp.message||'Could not post your signal.'; post.disabled=false; post.textContent='Post Signal'; return; }
        Pegasus.toast('✓','var(--green-dim)','Signal posted','It now appears on your profile.');
        await renderSignal();
      }catch(e){ err.textContent='Could not post your signal right now.'; post.disabled=false; post.textContent='Post Signal'; }
    };
    host.querySelectorAll('.cb-sig-x').forEach(function(b){ b.onclick=async function(){
      var id=b.getAttribute('data-sid'); b.disabled=true;
      try{ await sb.rpc('delete_my_signal',{p_id:id}); await renderSignal(); }catch(e){ b.disabled=false; }
    }; });
  }

  /* ── Initial render ─────────────────────────────────────────────────────── */
  await renderMe();
  renderSignal();
  renderSelected();
  applyFilter();
  /* Re-fetch when the page is restored from bfcache so state stays fresh. */
  window.addEventListener('pageshow', function(e){ if(e.persisted){ location.reload(); } });
});
</script>
</body>
</html>
