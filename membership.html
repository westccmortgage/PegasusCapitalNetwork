v.insertAdjacentHTML('beforeend','<div data-pegasus-redeem></div>');
if(window.PegAccessRedeemWidget) PegAccessRedeemWidget.autoMount();
v.insertAdjacentHTML('beforeend','<div style="margin-bottom:20px">'+PegBilling.membershipCard()+'</div>');
v.insertAdjacentHTML('beforeend','<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px"><div class="eyebrow" style="margin:0">Growth access — upgrade when you’re ready</div><div class="toggle"><div class="toggle-opt on" id="tm" onclick="setCyc(\'monthly\')">Monthly</div><div class="toggle-opt" id="ta" onclick="setCyc(\'annual\')">Annual · Save 30%</div></div></div><div id="plans"></div>');
