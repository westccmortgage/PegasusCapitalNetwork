<link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/icon-16.png">

<style>
/* Self-contained modal + form styles. The .sce-* modal classes and the
   .ws-textarea / .opt helpers live in showcase.css / dealroom.css, which this
   page does not load — so they are defined here (copied faithfully) to keep
   My Presences self-contained. .field/.label/.input/.row2 come from pegasus.css. */
.sce-scrim{position:fixed;inset:0;background:rgba(18,22,28,0.46);backdrop-filter:blur(12px);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:1000;overflow-y:auto}
.sce-modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--r5);width:100%;max-width:560px;box-shadow:var(--sh-float);overflow:hidden;animation:scePop var(--dur-normal) var(--ease-out)}
@keyframes scePop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.sce-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.sce-title{font-family:var(--serif);font-size:20px;font-weight:400;color:var(--text)}
.sce-x{border:none;background:var(--bg2);color:var(--text2);width:30px;height:30px;border-radius:var(--r1);cursor:pointer;font-size:14px;transition:all var(--dur-fast)}
.sce-x:hover{background:var(--bg3);color:var(--text)}
.sce-foot{display:flex;align-items:center;gap:10px;padding:16px 24px;border-top:1px solid var(--border);background:var(--bg1)}
.sce-err{flex:1;font-size:11px;font-family:var(--mono);color:var(--red);min-height:14px;text-align:left}
.opt{display:block;font-size:11px;color:var(--text4);font-weight:400;text-transform:none;letter-spacing:0}
.ws-textarea{width:100%;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:13.5px;line-height:1.6;outline:none;transition:border-color var(--dur-fast),box-shadow var(--dur-fast);resize:vertical;min-height:84px}
.ws-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-dim)}
.ws-textarea::placeholder{color:var(--text4)}
/* Mobile: stack each business row so the action buttons drop BELOW the business
   info instead of overlapping the title and crushing the badges/description. */
@media(max-width:640px){
  .mp-row-body{flex-direction:column;align-items:stretch !important;gap:14px !important}
  .mp-row-actions{max-width:none !important;justify-content:flex-start !important;align-items:flex-start !important}
  .mp-row-actions .btn{flex:1 1 auto;text-align:center}
}
</style>
</head><body>

<script>
Pegasus.boot(async function(){

// ── AUTH GATE ────────────────────────────────────────────────────────────────
// Member-only page. Unauthenticated users are redirected to sign in, matching
// the existing guard convention (ALLOW_DEMO_FALLBACK=false blocks at the auth
// layer; this is the page-level backstop).
var _st = (window.PegStore && PegStore.get) ? PegStore.get() : {};
if(_st.mode !== 'live'){ location.replace('/signin.html'); return; }

var v = Pegasus.mountApp({active:'Business Pages', title:'Manage Business Pages', sub:'Edit, preview, archive, and share the business pages you manage'});

var c = null;
try { c = await window.PegSB.ready; } catch(e) { c = null; }
var uid = null;
try { var u = await c.auth.getUser(); uid = u && u.data && u.data.user && u.data.user.id; } catch(e) {}
if(!uid){ location.replace('/signin.html'); return; }
window.__MP_UID = uid;

var esc = Pegasus.esc;

// ── Labels ───────────────────────────────────────────────────────────────────
var TYPE_LABEL = {
  personal:'Personal Presence', company:'Company', project:'Project',
  showcase:'Showcase', event:'Event', capital_program:'Capital Program',
  property:'Property / Listing', fund:'Fund / Vehicle'
};
var VIS_LABEL = { public_preview:'Public Preview', member_only:'Members Only', private:'Private' };
// Non-personal types selectable when creating a presence (personal is excluded).
var CREATE_TYPES = [
  ['company','Company'],['project','Project'],['showcase','Showcase'],
  ['event','Event'],['capital_program','Capital Program'],
  ['property','Property / Listing'],['fund','Fund / Vehicle']
];
// Which group a (non-archived) presence belongs to.
var BUSINESS_TYPES = {company:1, capital_program:1, fund:1};

function canManage(role){ return role==='owner' || role==='admin' || role==='editor'; }

// Logo chip — uploaded logo, or initials fallback. Reused on cards + edit modal.
function logoChip(name, logo, size){
  size = size || 44;
  var ini=(name||'?').trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('').toUpperCase()||'◈';
  if(logo) return '<div style="width:'+size+'px;height:'+size+'px;border-radius:10px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;background:var(--bg2)"><img src="'+esc(logo)+'" alt="" style="width:100%;height:100%;object-fit:cover"></div>';
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:10px;background:var(--blue-dim);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--blue-lt);font-size:'+Math.round(size/2.6)+'px;flex-shrink:0">'+esc(ini)+'</div>';
}

// ── Management toolbar (no marketing — this is a utility, not a landing page) ──
v.insertAdjacentHTML('beforeend',
  '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px">'+
    '<div style="font-size:12.5px;color:var(--text3)">The business pages you manage. Edit, preview, copy a link, or archive each one.</div>'+
    '<button class="btn btn-pri btn-sm" data-create-presence="true">+ New Business Page</button>'+
  '</div>'+
  '<div id="mp-flash"></div>'+
  '<div id="mp-body"><div style="padding:40px;text-align:center;color:var(--text3);font-size:12px">Loading your business pages…</div></div>');

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadPresences(){
  var body = document.getElementById('mp-body');
  try{
    // Canonical list of my presences (Phase 1 RPC) …
    var pres = await c.rpc('get_my_presences');
    if(pres.error) throw pres.error;
    // … plus my role / can_publish_as for each (own membership rows are readable
    // under RLS pmembers_read where user_id = auth.uid()).
    var mem = await c.from('presence_members')
      .select('presence_id, role, can_publish_as')
      .eq('user_id', uid);
    var roleBy = {};
    (mem.data||[]).forEach(function(m){ roleBy[m.presence_id] = m; });

    var rows = (pres.data||[]).map(function(p){
      var m = roleBy[p.id] || {};
      p._role = m.role || 'viewer';
      p._can_publish_as = !!m.can_publish_as;
      return p;
    });
    window.__MP_ROWS = rows;
    renderPresences(rows);
  }catch(e){
    console.error('[my-presences] load failed:', e);
    body.innerHTML = '<div class="banner bn-cancel"><div class="banner-msg">⚠️ <span>'+
      esc((e&&e.message)||'Could not load your business pages.')+'</span></div></div>';
  }
}

function presenceCard(p){
  var typeLbl = TYPE_LABEL[p.presence_type] || p.presence_type;
  var visLbl  = VIS_LABEL[p.visibility] || p.visibility;
  var statusCls = p.status==='active' ? 'b-active' : (p.status==='archived' ? 'b-cancel' : 'b-none');
  var roleLbl = (p._role||'viewer');
  var pub = p._can_publish_as ? '<span class="badge b-trial" title="You can publish as this presence">Publish As</span>' : '';
  var loc = [p.location, p.market].filter(Boolean).join(' · ');
  var desc = p.short_description ? '<div style="font-size:12px;color:var(--text3);line-height:1.5;margin-top:8px;max-width:620px">'+esc(p.short_description)+'</div>' : '';

  var meta =
    '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;align-items:center">'+
      '<span class="badge b-none" style="text-transform:capitalize">'+esc(typeLbl)+'</span>'+
      '<span class="badge b-none">'+esc(visLbl)+'</span>'+
      '<span class="badge '+statusCls+'" style="text-transform:capitalize">'+esc(p.status)+'</span>'+
      '<span class="badge b-none" style="text-transform:capitalize">Role: '+esc(roleLbl)+'</span>'+
      pub+
      (loc?'<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">'+esc(loc)+'</span>':'')+
    '</div>';

  var actions;
  if(p.presence_type==='personal'){
    actions = '<div class="mp-row-actions" style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">'+
      '<div style="font-size:11px;color:var(--text3)">Managed through your main profile.</div>'+
      '<a class="btn btn-ghost btn-sm" href="/profile-edit.html">Edit Main Profile →</a></div>';
  } else {
    var pageUrl = Pegasus.presencePath(p.presence_type, p.slug);
    var btns = '<a class="btn btn-pri btn-sm" href="'+pageUrl+'">View Business Page</a>';
    btns += ' <button class="btn btn-ghost btn-sm" onclick="mpPreview(\''+esc(p.id)+'\')">Preview</button>';
    if(canManage(p._role)) btns += ' <button class="btn btn-ghost btn-sm" onclick="mpEdit(\''+esc(p.id)+'\')">Edit Page</button>';
    if(canManage(p._role) && p.status!=='archived')
      btns += ' <button class="btn btn-ghost btn-sm" style="color:#c0392b;border-color:#c0392b" onclick="mpArchive(\''+esc(p.id)+'\')">Archive</button>';
    if(p.slug) btns += ' <button class="btn btn-ghost btn-sm" onclick="mpCopyLink(\''+esc(p.presence_type)+'\',\''+esc(p.slug)+'\')">Copy Link</button>';
    actions = '<div class="mp-row-actions" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;max-width:360px">'+btns+'</div>';
  }

  return '<div class="card mp-row" style="margin-bottom:12px"><div class="card-body mp-row-body" style="padding:16px 18px;display:flex;justify-content:space-between;gap:16px;align-items:flex-start">'+
    '<div class="mp-row-info" style="flex:1;min-width:0;display:flex;gap:12px;align-items:flex-start">'+
      (p.presence_type!=='personal'?logoChip(p.name,p.logo_url,44):'')+
      '<div style="min-width:0">'+
        '<div style="font-size:15px;font-weight:600;color:var(--text)">'+esc(p.name)+'</div>'+
        meta + desc +
      '</div>'+
    '</div>'+ actions +
  '</div></div>';
}

function section(title, sub, cards){
  return '<div style="margin-bottom:26px">'+
    '<div style="font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:4px">'+esc(title)+'</div>'+
    (sub?'<div style="font-size:12px;color:var(--text3);margin-bottom:12px">'+esc(sub)+'</div>':'<div style="margin-bottom:12px"></div>')+
    cards +
  '</div>';
}

function renderPresences(rows){
  var body = document.getElementById('mp-body');
  var personal = rows.filter(function(p){ return p.presence_type==='personal'; });
  var nonPersonal = rows.filter(function(p){ return p.presence_type!=='personal'; });
  var archived = nonPersonal.filter(function(p){ return p.status==='archived'; });
  var live = nonPersonal.filter(function(p){ return p.status!=='archived'; });
  var business = live.filter(function(p){ return BUSINESS_TYPES[p.presence_type]; });
  var projects = live.filter(function(p){ return !BUSINESS_TYPES[p.presence_type]; });

  var html = '';

  // 1. Personal
  html += section('Your Personal Profile', null,
    personal.length ? personal.map(presenceCard).join('') :
    '<div class="card"><div class="card-body" style="padding:16px 18px;font-size:12px;color:var(--text3)">No personal profile found.</div></div>');

  // 2. Businesses & Companies
  html += section('Businesses & Companies', 'Companies, capital programs, and funds you represent.',
    business.length ? business.map(presenceCard).join('') : groupEmpty());

  // 3. Projects & Showcases
  html += section('Projects & Showcases', 'Projects, showcases, events, and listings.',
    projects.length ? projects.map(presenceCard).join('') : groupEmpty());

  // 4. Archived
  if(archived.length){
    html += section('Archived Pages', 'No longer active. Not permanently deleted.',
      archived.map(presenceCard).join(''));
  }

  // Full empty state (no business pages at all)
  if(!nonPersonal.length){
    html = section('Your Personal Profile', null,
      personal.length ? personal.map(presenceCard).join('') : '') + fullEmptyState();
  }

  body.innerHTML = html;
}

function groupEmpty(){
  return '<div class="card"><div class="card-body" style="padding:16px 18px;font-size:12px;color:var(--text3)">'+
    'Nothing here yet.</div></div>';
}

function fullEmptyState(){
  return '<div style="text-align:center;padding:44px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px">'+
    '<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:10px">Get discovered by the right people</div>'+
    '<div style="max-width:560px;margin:0 auto;line-height:1.6;color:var(--text3);font-size:13px">'+
      'Your personal profile represents you. Business pages let you promote a company, project, event, capital program, or opportunity from the same Pegasus account — so clients, partners, investors, and referral sources can find you and reach out.'+
      '<br><br>Create your first business page when you\'re ready to show what you offer and who you want to connect with.'+
    '</div>'+
    '<div style="margin-top:18px"><button class="btn btn-pri" data-create-presence="true">+ Create Free Business Page</button></div>'+
  '</div>';
}

// ── Modal shell (matches the app's sce-* modal convention) ───────────────────
function shell(title, inner, footer){
  return '<div class="sce-scrim" onclick="if(event.target===this)Pegasus.closeModal()"><div class="sce-modal">'+
    '<div class="sce-head"><div class="sce-title">'+esc(title)+'</div><button class="sce-x" onclick="Pegasus.closeModal()" aria-label="Close">✕</button></div>'+
    '<div style="padding:18px 20px;max-height:70vh;overflow-y:auto">'+inner+'</div>'+
    '<div class="sce-foot"><div id="mpErr" class="sce-err"></div>'+footer+'</div></div></div>';
}

function gv(id){ var e=document.getElementById(id); return e?e.value:''; }
function setErr(msg){ var e=document.getElementById('mpErr'); if(e) e.textContent=msg||''; }

function formFields(p){
  p = p || {};
  function val(k){ return p[k]!=null ? esc(p[k]) : ''; }
  var visOpts = ['public_preview','member_only','private'].map(function(o){
    var selv = (p.visibility||'member_only')===o ? 'selected' : '';
    return '<option value="'+o+'" '+selv+'>'+VIS_LABEL[o]+'</option>';
  }).join('');
  return '<div class="field"><label class="label">Name <span style="color:var(--red)">*</span></label>'+
      '<input class="input" id="mp_name" maxlength="120" value="'+val('name')+'" placeholder="e.g. West Coast Capital Mortgage"></div>'+
    '<div class="field"><label class="label">Tagline</label>'+
      '<input class="input" id="mp_tagline" maxlength="160" value="'+val('tagline')+'" placeholder="Short positioning line"></div>'+
    '<div class="field"><label class="label">What you do</label>'+
      '<textarea class="ws-textarea" id="mp_short_description" maxlength="600" data-count placeholder="Describe what this business, project, or opportunity does…">'+val('short_description')+'</textarea></div>'+
    '<div class="field"><label class="label">What you offer</label>'+
      '<textarea class="ws-textarea" id="mp_offers" maxlength="600" data-count placeholder="Products, services, capital, deals, expertise…">'+val('offers')+'</textarea></div>'+
    '<div class="field"><label class="label">What you\'re looking for</label>'+
      '<textarea class="ws-textarea" id="mp_looking_for" maxlength="600" data-count placeholder="Clients, borrowers, investors, partners, referrals…">'+val('looking_for')+'</textarea></div>'+
    '<div class="field"><label class="label">Who should connect with you</label>'+
      '<textarea class="ws-textarea" id="mp_ideal_connections" maxlength="400" data-count placeholder="The kind of people or businesses you want to meet…">'+val('ideal_connections')+'</textarea></div>'+
    '<div class="row2"><div class="field"><label class="label">Category</label>'+
      '<input class="input" id="mp_category" maxlength="80" value="'+val('category')+'" placeholder="e.g. Lender"></div>'+
      '<div class="field"><label class="label">Industry</label>'+
      '<input class="input" id="mp_industry" maxlength="80" value="'+val('industry')+'" placeholder="e.g. Real Estate Finance"></div></div>'+
    '<div class="row2"><div class="field"><label class="label">Location</label>'+
      '<input class="input" id="mp_location" maxlength="120" value="'+val('location')+'" placeholder="City, State"></div>'+
      '<div class="field"><label class="label">Market</label>'+
      '<input class="input" id="mp_market" maxlength="120" value="'+val('market')+'" placeholder="e.g. CA / Southwest"></div></div>'+
    '<div class="field"><label class="label">Website URL</label>'+
      '<input class="input" id="mp_website_url" value="'+val('website_url')+'" placeholder="https://…"></div>'+
    '<div class="row2"><div class="field"><label class="label">CTA label</label>'+
      '<input class="input" id="mp_public_cta_label" maxlength="60" value="'+val('public_cta_label')+'" placeholder="e.g. Apply now"></div>'+
      '<div class="field"><label class="label">CTA URL</label>'+
      '<input class="input" id="mp_public_cta_url" value="'+val('public_cta_url')+'" placeholder="https://…"></div></div>'+
    '<div class="field"><label class="label">Visibility</label>'+
      '<select class="input" id="mp_visibility">'+visOpts+'</select></div>';
}

function collectFields(){
  return {
    p_name: gv('mp_name').trim(),
    p_tagline: gv('mp_tagline').trim() || null,
    p_short_description: gv('mp_short_description').trim() || null,
    p_category: gv('mp_category').trim() || null,
    p_industry: gv('mp_industry').trim() || null,
    p_location: gv('mp_location').trim() || null,
    p_market: gv('mp_market').trim() || null,
    p_website_url: gv('mp_website_url').trim() || null,
    p_public_cta_label: gv('mp_public_cta_label').trim() || null,
    p_public_cta_url: gv('mp_public_cta_url').trim() || null,
    p_visibility: gv('mp_visibility')
  };
}

// The business "offerings" fields are written by a separate RPC (migration 050)
// so the core create/edit RPCs stay untouched. Degrades gracefully if 050 isn't
// applied yet (the page still saves the standard fields).
function collectOfferings(){
  return {
    p_offers: gv('mp_offers').trim() || null,
    p_looking_for: gv('mp_looking_for').trim() || null,
    p_ideal_connections: gv('mp_ideal_connections').trim() || null
  };
}
async function saveOfferings(presenceId){
  var o = collectOfferings();
  if(o.p_offers==null && o.p_looking_for==null && o.p_ideal_connections==null) return;
  try{
    var r = await c.rpc('set_presence_offerings', Object.assign({ p_presence_id: presenceId }, o));
    if(r.error) console.warn('[my-presences] offerings not saved (apply migration 050):', r.error.message);
  }catch(e){ console.warn('[my-presences] offerings save skipped:', e && e.message); }
}

// ── Create ───────────────────────────────────────────────────────────────────
window.mpCreate = function(){
  try{
    if(!window.Pegasus || typeof Pegasus.modal !== 'function'){
      console.error('[my-presences] Pegasus.modal is unavailable — cannot open create modal.');
      alert('The form could not open. Please refresh the page and try again.');
      return;
    }
    var typeOpts = CREATE_TYPES.map(function(t){ return '<option value="'+t[0]+'">'+t[1]+'</option>'; }).join('');
    var inner = '<div class="field"><label class="label">What kind of page is this? <span style="color:var(--red)">*</span></label>'+
        '<select class="input" id="mp_type">'+typeOpts+'</select>'+
        '<div class="opt" style="margin-top:4px">Your personal profile is managed separately — this creates a page for a business, project, or opportunity.</div></div>'+
        formFields({visibility:'member_only'});
    var footer = '<button class="btn btn-ghost" onclick="Pegasus.closeModal()">Cancel</button>'+
      '<button class="btn btn-pri" onclick="mpSaveCreate()">Create Free Business Page</button>';
    Pegasus.modal(shell('Create a free business page', inner, footer));
  }catch(err){
    console.error('[my-presences] failed to open create modal:', err);
    alert('Could not open the create form: '+((err&&err.message)||err));
  }
};

// Reliable delegated handler — works for both the top button and the
// dynamically-rendered empty-state button regardless of render timing.
if(!window.__MP_DELEGATED){
  window.__MP_DELEGATED = true;
  document.addEventListener('click', function(event){
    var trigger = event.target.closest ? event.target.closest('[data-create-presence]') : null;
    if(!trigger) return;
    event.preventDefault();
    if(typeof window.mpCreate === 'function'){ window.mpCreate(); }
    else { console.error('[my-presences] mpCreate handler not ready.'); }
  });
}

window.mpSaveCreate = async function(){

// ── View Preview (private, authenticated-only) ───────────────────────────────
// Read-only preview of the full presence, rendered from already-loaded data
// (window.__MP_ROWS). No new query, no public route — Phase 3 will add the real
// public page.
window.mpPreview = function(id){
  try{
    if(!window.Pegasus || typeof Pegasus.modal !== 'function'){
      console.error('[my-presences] Pegasus.modal is unavailable — cannot open preview.');
      alert('The preview could not open. Please refresh the page and try again.');
      return;
    }
    var p = (window.__MP_ROWS||[]).filter(function(x){return x.id===id;})[0];
    if(!p){ console.error('[my-presences] preview: presence not found', id); return; }

    var typeLbl = TYPE_LABEL[p.presence_type] || p.presence_type;
    var visLbl  = VIS_LABEL[p.visibility] || p.visibility;
    var statusCls = p.status==='active' ? 'b-active' : (p.status==='archived' ? 'b-cancel' : 'b-none');
    var pub = p._can_publish_as ? '<span class="badge b-trial" title="You can publish as this presence">Publish As</span>' : '';

    function txt(val){ return (val==null||val==='') ? '<span style="color:var(--text4)">—</span>' : esc(val); }
    function linkVal(u){
      if(!u) return '<span style="color:var(--text4)">—</span>';
      var safe = (Pegasus.safeUrl ? Pegasus.safeUrl(u) : esc(u));
      return '<a href="'+safe+'" target="_blank" rel="noopener noreferrer" style="color:var(--blue);word-break:break-all">'+esc(u)+'</a>';
    }
    function ctaVal(){
      if(!p.public_cta_label && !p.public_cta_url) return '<span style="color:var(--text4)">—</span>';
      var lbl = p.public_cta_label ? esc(p.public_cta_label) : '(no label)';
      if(p.public_cta_url){
        var safe = (Pegasus.safeUrl ? Pegasus.safeUrl(p.public_cta_url) : esc(p.public_cta_url));
        return '<a href="'+safe+'" target="_blank" rel="noopener noreferrer" style="color:var(--blue)">'+lbl+'</a>'+
               ' <span style="color:var(--text4);font-size:11px;word-break:break-all">'+esc(p.public_cta_url)+'</span>';
      }
      return lbl;
    }
    function pvRow(label, valHtml){
      return '<div style="display:grid;grid-template-columns:150px 1fr;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px">'+
        '<div style="color:var(--text3)">'+esc(label)+'</div>'+
        '<div style="color:var(--text);line-height:1.5">'+valHtml+'</div></div>';
    }

    var header = '<div style="margin-bottom:14px">'+
      '<div style="font-family:var(--serif);font-size:22px;font-weight:400;color:var(--text)">'+esc(p.name)+'</div>'+
      (p.tagline ? '<div style="font-size:13px;color:var(--text2);margin-top:4px">'+esc(p.tagline)+'</div>' : '')+
      '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;align-items:center">'+
        '<span class="badge b-none" style="text-transform:capitalize">'+esc(typeLbl)+'</span>'+
        '<span class="badge b-none">'+esc(visLbl)+'</span>'+
        '<span class="badge '+statusCls+'" style="text-transform:capitalize">'+esc(p.status)+'</span>'+
        '<span class="badge b-none" style="text-transform:capitalize">Role: '+esc(p._role||'viewer')+'</span>'+pub+
      '</div></div>';

    var rows =
      pvRow('What you do', txt(p.short_description))+
      pvRow('What you offer', txt(p.offers))+
      pvRow('Looking for', txt(p.looking_for))+
      pvRow('Who should connect', txt(p.ideal_connections))+
      pvRow('Category', txt(p.category))+
      pvRow('Industry', txt(p.industry))+
      pvRow('Location', txt(p.location))+
      pvRow('Market', txt(p.market))+
      pvRow('Website', linkVal(p.website_url))+
      pvRow('Call to action', ctaVal())+
      pvRow('Visibility', esc(visLbl))+
      pvRow('Status', '<span style="text-transform:capitalize">'+esc(p.status)+'</span>')+
      pvRow('Your role', '<span style="text-transform:capitalize">'+esc(p._role||'viewer')+'</span>')+
      pvRow('Can publish as', p._can_publish_as ? 'Yes' : 'No');

    var pageUrl = Pegasus.presencePath(p.presence_type, p.slug);
    var live = '<div style="margin-top:16px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px">'+
      '<div style="font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:6px">Live business page</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:8px"><a class="btn btn-pri btn-sm" href="'+pageUrl+'">View Business Page</a>'+
      (p.slug?'<button class="btn btn-ghost btn-sm" onclick="mpCopyLink(\''+esc(p.presence_type)+'\',\''+esc(p.slug)+'\')">Copy Link</button>':'')+'</div></div>';

    var inner = header + '<div>'+rows+'</div>' + live;
    var footer = '<button class="btn btn-ghost" onclick="Pegasus.closeModal()">Close</button>'+
      (canManage(p._role) ? '<button class="btn btn-pri" onclick="mpEdit(\''+esc(p.id)+'\')">Edit Page</button>' : '');
    Pegasus.modal(shell('Business page preview', inner, footer));
  }catch(err){
    console.error('[my-presences] preview error:', err);
    alert('Could not open preview: '+((err&&err.message)||err));
  }
};

// ── Copy Link (to the public/member presence page) ───────────────────────────
window.mpCopyLink = function(type, slug){
  var url = 'https://pegasuscapitalnetwork.com' + Pegasus.presencePath(type, slug);
  function done(){ Pegasus.toast('⧉','var(--green-dim)','Link copied', url.replace(/^https?:\/\//,'')); }
  function fallback(){
    try{ var ta=document.createElement('textarea'); ta.value=url; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); }
    catch(e){ alert(url); }
  }
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done).catch(fallback); }
    else fallback();
  }catch(e){ fallback(); }
};

// ── Logo upload / replace / remove (business pages only) ─────────────────────
// Reuses the existing public 'profile-media' bucket: files go under
// {uid}/presence-logo-… (owner-enforced by the bucket's RLS), then the public
// URL is stored via the set_presence_logo RPC.
function mpRenderLogoPreview(url){
  var box=document.getElementById('mp-logo-preview'); if(!box) return;
  var nm=window.__MP_EDIT_NAME||'';
  box.innerHTML=logoChip(nm, url, 52);
  var actions=document.getElementById('mp-logo-actions');
  if(actions){
    actions.innerHTML='<button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById(\'mp-logo-file\').click()">'+(url?'Replace Logo':'Upload Logo')+'</button>'+
      (url?' <button type="button" class="btn btn-ghost btn-sm" style="color:#c0392b;border-color:#c0392b" onclick="mpRemoveLogo(\''+esc(window.__MP_EDIT_ID)+'\')">Remove</button>':'');
  }
}
window.mpLogoPicked = function(id, input){
  var file = input && input.files && input.files[0]; if(!file) return;
  mpUploadLogoFile(id, file);
};
async function mpUploadLogoFile(id, file){
  var st=document.getElementById('mp-logo-status');
  if(!/^image\//.test(file.type)){ if(st)st.textContent='Please choose an image file (JPG, PNG, WebP).'; return; }
  if(file.size/1048576 > 5){ if(st)st.textContent='Image must be under 5MB.'; return; }
  var ext=(file.name.split('.').pop()||'png').toLowerCase().replace(/[^a-z0-9]/g,'')||'png';
  var path=window.__MP_UID+'/presence-logo-'+id+'-'+Date.now()+'.'+ext;
  if(st)st.textContent='Uploading…';
  try{
    var up=await c.storage.from('profile-media').upload(path,file,{cacheControl:'3600',upsert:true,contentType:file.type});
    if(up.error){
      var em=(up.error.message||'').toLowerCase();
      if(em.indexOf('bucket')!==-1||em.indexOf('not found')!==-1) throw new Error('Storage bucket "profile-media" missing — run migration 007 in Supabase.');
      if(em.indexOf('row-level')!==-1||em.indexOf('policy')!==-1||em.indexOf('denied')!==-1) throw new Error('Upload not permitted (storage policy). Run migration 007.');
      throw up.error;
    }
    var pub=c.storage.from('profile-media').getPublicUrl(path);
    var url=pub&&pub.data?pub.data.publicUrl:null;
    if(!url) throw new Error('Could not resolve the logo URL.');
    var r=await c.rpc('set_presence_logo',{p_presence_id:id,p_logo_url:url});
    if(r.error) throw new Error((r.error.message||'Could not save logo')+' (apply migration 052?)');
    var row=(window.__MP_ROWS||[]).filter(function(x){return x.id===id;})[0]; if(row) row.logo_url=url;
    mpRenderLogoPreview(url);
    if(st)st.textContent='Logo updated.';
    Pegasus.toast('◫','var(--green-dim)','Logo updated','');
  }catch(e){ console.error('[my-presences] logo upload:', e); if(st)st.textContent='Upload failed: '+((e&&e.message)||e); }
}
window.mpRemoveLogo = async function(id){
  if(!confirm('Remove this logo?')) return;
  var st=document.getElementById('mp-logo-status');
  try{
    var r=await c.rpc('set_presence_logo',{p_presence_id:id,p_logo_url:null});
    if(r.error) throw r.error;
    var row=(window.__MP_ROWS||[]).filter(function(x){return x.id===id;})[0]; if(row) row.logo_url=null;
    mpRenderLogoPreview(null);
    if(st)st.textContent='Logo removed.';
    Pegasus.toast('◫','var(--amber-dim)','Logo removed','');
  }catch(e){ if(st)st.textContent='Could not remove logo: '+((e&&e.message)||e); }
};

// ── Edit ─────────────────────────────────────────────────────────────────────
window.mpEdit = function(id){
  var p = (window.__MP_ROWS||[]).filter(function(x){return x.id===id;})[0];
  if(!p) return;
  if(p.presence_type==='personal'){ location.href='/profile-edit.html'; return; }
  window.__MP_EDIT_ID=id; window.__MP_EDIT_NAME=p.name||'';
  var statusOpts = ['active','draft'].map(function(o){
    var selv = (p.status||'active')===o ? 'selected' : '';
    return '<option value="'+o+'" '+selv+'>'+(o.charAt(0).toUpperCase()+o.slice(1))+'</option>';
  }).join('');
  var logoField =
    '<div class="field"><label class="label">Logo</label>'+
      '<div style="display:flex;align-items:center;gap:12px">'+
        '<div id="mp-logo-preview">'+logoChip(p.name, p.logo_url, 52)+'</div>'+
        '<div id="mp-logo-actions" style="display:flex;gap:6px;flex-wrap:wrap">'+
          '<button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById(\'mp-logo-file\').click()">'+(p.logo_url?'Replace Logo':'Upload Logo')+'</button>'+
          (p.logo_url?'<button type="button" class="btn btn-ghost btn-sm" style="color:#c0392b;border-color:#c0392b" onclick="mpRemoveLogo(\''+esc(id)+'\')">Remove</button>':'')+
        '</div>'+
        '<input type="file" id="mp-logo-file" accept="image/*" style="display:none" onchange="mpLogoPicked(\''+esc(id)+'\', this)">'+
      '</div>'+
      '<div id="mp-logo-status" class="opt" style="margin-top:6px"></div>'+
    '</div>';
  var inner = logoField + formFields(p) +
    '<div class="field"><label class="label">Status</label><select class="input" id="mp_status">'+statusOpts+'</select>'+
      '<div class="opt" style="margin-top:4px">Use Archive (on the card) to retire a page.</div></div>';
  var footer = '<button class="btn btn-ghost" onclick="Pegasus.closeModal()">Cancel</button>'+
    '<button class="btn btn-pri" onclick="mpSaveEdit(\''+esc(id)+'\')">Save changes</button>';
  Pegasus.modal(shell('Edit business page', inner, footer));
};

window.mpArchive = async function(id){
  var p = (window.__MP_ROWS||[]).filter(function(x){return x.id===id;})[0] || {};
  if(p.presence_type==='personal') return;
  if(!confirm('Archive this business page? It will no longer appear as active, but it will not be permanently deleted.')) return;

};
