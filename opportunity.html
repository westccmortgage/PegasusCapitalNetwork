<!DOCTYPE html><html lang="en"><head><title>Opportunity — Pegasus Network</title>
<link rel="canonical" href="https://pegasuscapitalnetwork.com/opportunity.html">
<!-- Opportunities are viewable by direct link only — not a public directory, and
     member_only/private opportunities must not be indexable. -->
<meta name="robots" content="noindex,nofollow">
<!-- Default social-preview metadata (professional fallback for link unfurls).
     NOTE: link-preview crawlers (LinkedIn/Facebook/X) don't run JS, so they see
     THESE static tags — a clean Pegasus-branded card — for every shared
     opportunity. The JS below upgrades title/description/url to the specific
     opportunity for browsers and JS-capable clients. Per-opportunity preview
     IMAGES require server-side/edge rendering (future). -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Pegasus Capital Network">
<meta property="og:title" content="An opportunity on Pegasus Capital Network">
<meta property="og:description" content="A curated opportunity inside Pegasus Capital Network — trusted visibility, business pages, and the right introductions.">
<meta property="og:url" content="https://pegasuscapitalnetwork.com/opportunity.html">
<meta property="og:image" content="https://pegasuscapitalnetwork.com/assets/brand/og-default.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="An opportunity on Pegasus Capital Network">
<meta name="twitter:description" content="A curated opportunity inside Pegasus Capital Network.">
<meta name="twitter:image" content="https://pegasuscapitalnetwork.com/assets/brand/og-default.png">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/pegasus.css?v=dealroom-entitlements-20260524-1529">
<link rel="stylesheet" href="/css/profile-shell.css?v=dealroom-entitlements-20260524-1529">
<link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/icon-16.png">
<link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#08111C">
<style>
.ppg-state{max-width:560px;margin:90px auto;text-align:center;padding:30px}
.ppg-state h1{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:300;color:var(--text);margin-bottom:10px}
.ppg-state p{color:var(--text2);line-height:1.6;margin-bottom:22px;max-width:440px;margin-left:auto;margin-right:auto}
.ppg-soon{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);padding:10px 0;border-bottom:1px solid var(--border)}
.ppg-soon:last-child{border-bottom:none}
.ppg-soon .pill{font-size:9px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text4);border:1px solid var(--border2);border-radius:12px;padding:3px 8px;margin-left:auto}
.opp-desc{font-size:14.5px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
</style>
</head><body>
<!-- PEGASUS_BUILD_VERSION = dealroom-entitlements-20260524-1529 -->
<script>window.PEGASUS_BUILD_VERSION="dealroom-entitlements-20260524-1529";</script>
<script src="/js/pegasus-config.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-supabase.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-entitlements.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-data.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-content.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-match.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-store.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-api.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-forms.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-auth.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-core.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-pages.js?v=dealroom-entitlements-20260524-1529"></script>
<script>
Pegasus.boot(async function(){
  Pegasus.mountPublic('');

  var esc = Pegasus.esc;
  var CANON = 'https://pegasuscapitalnetwork.com';

  var OPP_TYPE = { opportunity:'Opportunity', project:'Project', listing:'Listing', property:'Property', capital_request:'Capital Request', fund:'Fund', deal:'Deal', event:'Event', other:'Opportunity', showcase:'Showcase', startup:'Startup', partnership:'Partnership' };
  // Presentation-format labels (migration 056). Prefer these over the raw type.
  var TMPL_LABEL = { capital_program:'Capital Program', project:'Project', property_listing:'Listing', startup_business_need:'Startup', showcase:'Showcase', event_session:'Event', partnership_request:'Partnership' };
  var VIS_LABEL = { public_preview:'Public Preview', member_only:'Members Only', private:'Private' };
  var TYPE_SEG = { company:'business', capital_program:'business', fund:'fund', project:'project', showcase:'showcase', event:'event', property:'property' };

  function cap(s){ return (s||'').replace(/\b\w/g,function(c){return c.toUpperCase();}); }
  function webHref(u){ u=(u||'').trim(); if(!u) return ''; return /^[a-z][a-z0-9+.-]*:\/\//i.test(u)?u:('https://'+u.replace(/^\/+/,'')); }
  function safeHref(u){ var h=webHref(u); return Pegasus.safeUrl ? Pegasus.safeUrl(h) : h; }
  function isLoggedIn(){ try{ var st=PegStore.get(); return st && st.mode==='live' && st.user && st.user.id!=='demo'; }catch(e){ return false; } }

  var main = document.createElement('main');
  document.body.appendChild(main);
  function addFooter(){ var f=document.createElement('div'); f.innerHTML=Pegasus.footer(); if(f.firstElementChild) document.body.appendChild(f.firstElementChild); }
  function stateView(title, body, ctas){
    main.innerHTML = '<div class="ppg-state"><h1>'+esc(title)+'</h1><p>'+body+'</p>'+(ctas||'')+'</div>';
    addFooter();
  }

  // ── Resolve slug from ?slug= (set by the clean-URL rewrite) or a clean path ──
  var slug = (new URLSearchParams(location.search)).get('slug') || '';
  if(!slug){
    var pm = location.pathname.match(/^\/(opportunity|deal|listing)\/([^\/?#]+)\/?$/i);
    if(pm) slug = decodeURIComponent(pm[2]);
  }
  slug = slug.trim();
  if(!slug){ stateView('Opportunity not found', 'No opportunity was specified.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  var c = null;
  try { c = await window.PegSB.ready; } catch(e) { c = null; }
  if(!c){ stateView('Something went wrong', 'We could not connect right now. Please try again shortly.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  var data = null;
  try {
    var res = await c.rpc('get_opportunity_by_slug', { p_slug: slug });
    if(res && res.error) throw res.error;
    data = res ? res.data : null;
  } catch(e){
    console.error('[opportunity] load failed — apply migration 054 and restart Supabase. Error:', e);
    stateView('Opportunity unavailable', 'This opportunity could not be loaded right now. Please try again shortly.', '<a class="btn btn-ghost" href="/">Return home</a>');
    return;
  }

  // ── Access states ────────────────────────────────────────────────────────────
  if(!data){ stateView('Not found', 'This opportunity could not be found.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }
  var access = data.access;
  if(access === 'locked'){
    stateView('Available inside Pegasus',
      'This opportunity is available inside Pegasus. Sign in or create your own free page to continue.',
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
        '<a class="btn btn-pri" href="/signin.html">Sign In</a>'+
        '<a class="btn btn-ghost" href="/signup.html">Create Your Free Page</a></div>');
    return;
  }
  if(access === 'unavailable'){ stateView('Unavailable', 'This opportunity is not available.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }
  if(access !== 'full' || !data.opportunity){ stateView('Not found', 'This opportunity could not be found.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  // ── Full view ────────────────────────────────────────────────────────────────
  var o = data.opportunity;
  var by = data.presented_by || {};
  var canManage = !!data.can_manage;
  var typeLbl = (o.template_type && TMPL_LABEL[o.template_type]) || OPP_TYPE[o.opportunity_type] || 'Opportunity';
  var visLbl  = VIS_LABEL[o.visibility] || o.visibility;
  var loc = [o.location, o.market].filter(Boolean).join(' · ');
  document.title = (o.title || 'Opportunity') + ' — Pegasus Network';

  // Clean public link to the presenting business page.
  var bySeg = TYPE_SEG[by.presence_type] || 'business';
  var byPath = by.slug ? ('/'+bySeg+'/'+encodeURIComponent(by.slug)) : '';

  // Clean canonical URL for this opportunity.
  var cleanPath = Pegasus.opportunityPath ? Pegasus.opportunityPath(o.slug) : ('/opportunity/'+encodeURIComponent(o.slug));
  var cleanUrl = CANON + cleanPath;
  (function(){ var cl=document.querySelector('link[rel="canonical"]'); if(cl) cl.setAttribute('href', cleanUrl); })();

  // Upgrade social metadata to this specific opportunity (for JS-capable clients;
  // static defaults in <head> cover non-JS link-preview crawlers).
  (function(){
    var metaTitle=(o.title||'Opportunity')+(by.name?(' · '+by.name):'')+' — Pegasus';
    var metaDesc=(o.summary||o.description||('A '+typeLbl.toLowerCase()+(by.name?(' presented by '+by.name):'')+' on Pegasus Capital Network.')).slice(0,200);
    function setMeta(sel,val){ var m=document.querySelector(sel); if(m) m.setAttribute('content',val); }
    setMeta('meta[property="og:title"]',metaTitle); setMeta('meta[name="twitter:title"]',metaTitle);
    setMeta('meta[property="og:description"]',metaDesc); setMeta('meta[name="twitter:description"]',metaDesc);
    setMeta('meta[property="og:url"]',cleanUrl);
    var md=document.querySelector('meta[name="description"]'); if(md) md.setAttribute('content',metaDesc);
  })();

  // HERO
  var hero =
  '<section class="pp-hero">'+
    '<div class="pp-hero-grid"></div>'+
    '<div class="pp-hero-wm" aria-hidden="true">'+esc((o.title||'').slice(0,16))+'</div>'+
    '<div class="pp-hero-c">'+
      '<div>'+
        '<div class="pp-sub" style="margin-bottom:8px"><strong>'+esc(typeLbl)+'</strong>'+(by.name?' · Presented by '+esc(by.name):'')+'</div>'+
        '<h1 class="pp-name">'+esc(o.title)+'</h1>'+
        (loc?'<div class="pp-sub">'+esc(loc)+'</div>':'')+
        '<div class="pp-tags">'+
          '<span class="pp-tag pp-tag-r">'+esc(typeLbl)+'</span>'+
          (o.amount_label?'<span class="pp-tag pp-tag-v">'+esc(o.amount_label)+'</span>':'')+
          (o.category?'<span class="pp-tag pp-tag-m">'+esc(o.category)+'</span>':'')+
          (canManage?'<span class="pp-tag pp-tag-m">'+esc(visLbl)+'</span>':'')+
        '</div>'+
        (o.summary?'<div class="pp-tagline"><div class="pp-tagline-bar"></div><div class="pp-tagline-text">'+esc(o.summary)+'</div></div>':'')+
      '</div>'+
      '<div class="pp-actions">'+
        '<button class="btn btn-ghost" onclick="oppCopyLink()" style="color:rgba(255,255,255,.82);border-color:rgba(255,255,255,.2)">Copy Link</button>'+
        (canManage && byPath?'<a class="btn btn-ghost" href="'+esc(byPath)+'" style="color:rgba(255,255,255,.82);border-color:rgba(255,255,255,.2)">Manage on business page</a>':'')+
      '</div>'+
    '</div>'+
    '<div class="pp-hero-horizon"></div>'+
  '</section>';

  // RAIL
  function railItem(label,val,dot){ return '<div class="pp-strip-item"><div class="pp-rail-label">'+(dot?'<span class="pp-rail-dot '+dot+'"></span>':'')+esc(label)+'</div><div class="pp-rail-val">'+esc(val)+'</div></div>'; }
  var rf=[ railItem('Type', typeLbl, 'blue') ];
  if(o.amount_label) rf.push(railItem('Size', o.amount_label));
  if(o.category) rf.push(railItem('Category', o.category));
  if(loc) rf.push(railItem('Region', loc));
  if(canManage) rf.push(railItem('Visibility', visLbl));
  var rail = '<div class="pp-strip"><div class="pp-strip-inner">'+rf.join('')+'</div></div>';

  // MAIN — description + how to engage
  var descCard = o.description
    ? '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">About this opportunity</span></div><div class="pp-card-body"><div class="opp-desc">'+esc(o.description)+'</div></div></div>'
    : (o.summary ? '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">About this opportunity</span></div><div class="pp-card-body"><div class="opp-desc">'+esc(o.summary)+'</div></div></div>' : '');

  var ctaBtn = o.cta_url ? '<a class="btn btn-pri" href="'+safeHref(o.cta_url)+'" target="_blank" rel="noopener noreferrer">'+esc(o.cta_label||'Learn more')+'</a>' : '';
  var engage;
  if(isLoggedIn()){
    engage = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">How to engage</span></div><div class="pp-card-body">'+
      (ctaBtn?'<div style="margin-bottom:12px">'+ctaBtn+'</div>':'')+
      (canManage
        ? '<div style="font-size:12.5px;color:var(--text4)">When members express interest in this opportunity, their requests appear in your <a href="/dashboard.html#requests" style="color:var(--blue)">Workspace</a>.</div>'
        : '<div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px">Reach out about this opportunity. Pegasus shares your profile with the presenting team so they can respond — your private contact details are never shown.</div>'+
          '<button class="btn btn-pri" onclick="oppEngage()">Express Interest / Connect</button>')+
    '</div></div>';
  } else {
    engage = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">How to engage</span></div><div class="pp-card-body">'+
      (ctaBtn?'<div style="margin-bottom:14px">'+ctaBtn+'</div>':'')+
      '<div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px">Pegasus members can engage with this opportunity inside the network.</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap"><a class="btn btn-pri" href="/signin.html">Sign In to Connect</a><a class="btn btn-ghost" href="/signup.html">Create Your Free Page</a></div>'+
    '</div></div>';
  }
  var mainCol = descCard + engage;

  // RIGHT — Presented by
  var presented = '';
  if(by.name){
    var byInit = (by.name||'?').trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
    presented = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">Presented by</span></div><div class="pp-card-body">'+
      '<div style="display:flex;align-items:center;gap:11px">'+
        '<div style="width:42px;height:42px;border-radius:10px;background:var(--blue-dim);border:1px solid rgba(58,143,232,.2);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--blue-lt);font-size:14px;flex-shrink:0">'+esc(byInit)+'</div>'+
        '<div style="min-width:0"><div style="font-size:14px;font-weight:600;color:var(--text)">'+esc(by.name)+'</div>'+
        (byPath?'<a class="pp-card-action" href="'+esc(byPath)+'">View business page →</a>':'')+'</div>'+
      '</div></div></div>';
  }
  var sideActions='<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">Next steps</span></div><div class="pp-card-body"><div style="display:flex;flex-direction:column;gap:8px">'+
    '<button class="btn btn-pri btn-sm" onclick="oppShareThis()">Share this opportunity</button>'+
    (byPath?'<a class="btn btn-ghost btn-sm" href="'+esc(byPath)+'">View Presenting Business</a>':'')+
    '<button class="btn btn-ghost btn-sm" onclick="oppCopyLink()">Copy Link</button>'+
    '</div></div></div>';
  var rightCol = presented + sideActions;

  main.innerHTML = hero + rail +
    '<div class="pp-body" style="grid-template-columns:1fr 320px">'+
      '<div>'+mainCol+'</div>'+
      '<div>'+rightCol+'</div>'+
    '</div>';
  addFooter();

  // Engage handler — express interest in this opportunity (presence derived server-side).
  window.oppEngage = function(){ Pegasus.engageOpen({ opportunityId: o.id, name: o.title }); };

  // Share this opportunity outside Pegasus (visibility rules enforced in shareSheet).
  window.oppShareThis = function(){
    Pegasus.opportunityShare(
      { title:o.title, slug:o.slug, summary:o.summary, visibility:o.visibility, status:o.status },
      { businessName: by.name||'', badge: typeLbl }
    );
  };

  window.oppCopyLink = function(){
    var url = cleanUrl;
    function done(){ Pegasus.toast('⧉','var(--green-dim)','Link copied', url.replace(/^https?:\/\//,'')); }
    function fallback(){
      try{ var ta=document.createElement('textarea'); ta.value=url; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); }
      catch(e){ alert(url); }
    }
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done).catch(fallback); }
      else fallback();
    }catch(e){ fallback(); }
  };
});
</script></body></html>
