<!DOCTYPE html><html lang="en"><head><title>Presence — Pegasus Network</title>
<link rel="canonical" href="https://pegasuscapitalnetwork.com/presence.html">
<!-- Phase 3: presence pages are viewable by direct link only — not a public
     directory, and member_only/private presences must not be indexable. -->
<meta name="robots" content="noindex,nofollow">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/pegasus.css?v=dealroom-entitlements-20260524-1529">
<link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/icon-16.png">
<link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#08111C">
<style>
.ppg-wrap{max-width:860px;margin:30px auto 70px;padding:0 20px}
.ppg-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r4);padding:26px 28px;margin-bottom:16px}
.ppg-type{display:inline-block;font-size:10px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--blue-lt);background:var(--blue-dim);border:1px solid rgba(34,113,195,.25);padding:5px 11px;border-radius:20px}
.ppg-name{font-family:var(--serif);font-size:30px;font-weight:400;color:var(--text);line-height:1.15;margin:14px 0 6px}
.ppg-tag{font-size:15px;color:var(--text2);line-height:1.5;max-width:620px}
.ppg-meta{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:12px}
.ppg-badges{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.ppg-sec-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:12px}
.ppg-row{display:grid;grid-template-columns:160px 1fr;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.ppg-row:last-child{border-bottom:none}
.ppg-row .k{color:var(--text3)}
.ppg-row .v{color:var(--text);line-height:1.55}
.ppg-actions{display:flex;flex-wrap:wrap;gap:10px}
.ppg-state{max-width:560px;margin:90px auto;text-align:center;padding:30px}
.ppg-state h1{font-family:var(--serif);font-size:25px;font-weight:300;color:var(--text);margin-bottom:10px}
.ppg-state p{color:var(--text2);line-height:1.6;margin-bottom:22px}
.ppg-soon{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);padding:10px 0;border-bottom:1px solid var(--border)}
.ppg-soon:last-child{border-bottom:none}
.ppg-soon .pill{font-size:9px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text4);border:1px solid var(--border2);border-radius:12px;padding:3px 8px;margin-left:auto}
</style>
</head><body>
<!-- PEGASUS_BUILD_VERSION = dealroom-entitlements-20260524-1529 -->
<script>window.PEGASUS_BUILD_VERSION="dealroom-entitlements-20260524-1529";</script>
<script src="/js/pegasus-config.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-supabase.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-entitlements.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-data.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-content.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-match.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-store.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-api.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-forms.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-auth.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-core.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-pages.js?v=dealroom-entitlements-20260524-1529"></script>
<script>
Pegasus.boot(async function(){
  Pegasus.mountPublic('');

  var esc = Pegasus.esc;
  var CANON = 'https://pegasuscapitalnetwork.com';

  var TYPE_LABEL = {
    personal:'Personal Presence', company:'Company Presence', project:'Project Presence',
    showcase:'Showcase Presence', event:'Event / Session Presence', capital_program:'Capital Program',
    property:'Property / Listing', fund:'Fund / Vehicle'
  };
  var TYPE_BLURB = {
    personal:'A personal presence represents an individual member of Pegasus.',
    company:'A company presence represents a business operating inside the Pegasus ecosystem.',
    project:'A project presence represents a specific initiative or development.',
    showcase:'A showcase presence highlights a specific offering or program.',
    event:'An event presence represents a session, briefing, or gathering.',
    capital_program:'A capital program presence represents a structured funding initiative.',
    property:'A property presence represents a specific asset or listing.',
    fund:'A fund presence represents an investment vehicle.'
  };
  var VIS_LABEL = { public_preview:'Public Preview', member_only:'Members Only', private:'Private' };

  function webHref(u){ u=(u||'').trim(); if(!u) return ''; return /^[a-z][a-z0-9+.-]*:\/\//i.test(u)?u:('https://'+u.replace(/^\/+/,'')); }
  function safeHref(u){ var h=webHref(u); return Pegasus.safeUrl ? Pegasus.safeUrl(h) : h; }

  var main = document.createElement('main');
  main.className = 'ppg-wrap';
  document.body.appendChild(main);

  function addFooter(){ var f=document.createElement('div'); f.innerHTML=Pegasus.footer(); if(f.firstElementChild) document.body.appendChild(f.firstElementChild); }
  function isLoggedIn(){ try{ var st=PegStore.get(); return st && st.mode==='live' && st.user && st.user.id!=='demo'; }catch(e){ return false; } }

  function stateView(title, body, ctas){
    main.innerHTML = '<div class="ppg-state"><h1>'+esc(title)+'</h1><p>'+body+'</p>'+(ctas||'')+'</div>';
    addFooter();
  }

  // ── Resolve slug ─────────────────────────────────────────────────────────
  var slug = (new URLSearchParams(location.search)).get('slug') || '';
  slug = slug.trim();
  if(!slug){ stateView('Presence not found', 'No presence was specified.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  var c = null;
  try { c = await window.PegSB.ready; } catch(e) { c = null; }
  if(!c){ stateView('Something went wrong', 'We could not connect right now. Please try again shortly.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  // Is this error "the RPC isn't in the API yet" (049 not applied, or PostgREST
  // schema cache not reloaded — the known Supabase quirk that needs a restart)?
  function rpcMissing(err){
    if(!err) return false;
    var code = err.code || '';
    var msg  = ((err.message||'')+' '+(err.details||'')+' '+(err.hint||'')).toLowerCase();
    return code==='PGRST202' || code==='404' ||
           /could not find the function|function .* does not exist|schema cache|not found/.test(msg);
  }

  // Degraded fallback using only Phase-1 objects (already in the API): RLS-
  // protected presences for signed-in users, the safe view for anonymous ones.
  // Selects whitelisted columns only — never owner_user_id / metadata.
  async function fallbackResolve(s){
    var SAFE = 'id,presence_type,name,slug,tagline,short_description,category,industry,location,market,website_url,public_cta_label,public_cta_url,visibility,status';
    if(isLoggedIn()){
      var uid=null; try{ var u=await c.auth.getUser(); uid=u&&u.data&&u.data.user&&u.data.user.id; }catch(e){}
      var q=await c.from('presences').select(SAFE).eq('slug',s).maybeSingle();
      if(q.error) console.error('[presence] fallback presences error:', q.error);
      if(q.data){
        var role=null, canPub=false, canManage=false;
        if(uid){
          var m=await c.from('presence_members').select('role,can_publish_as').eq('presence_id',q.data.id).eq('user_id',uid).maybeSingle();
          if(m && m.data){ role=m.data.role; canPub=!!m.data.can_publish_as; canManage=['owner','admin','editor'].indexOf(role)!==-1; }
        }
        return { access:'full', presence:q.data, role:role, can_publish_as:canPub, can_manage:canManage };
      }
      return { access:'unavailable' };  // not visible under RLS (private/not-owned/archived) or absent
    } else {
      var v=await c.from('public_presence_previews').select('*').eq('slug',s).maybeSingle();
      if(v.error) console.error('[presence] fallback view error:', v.error);
      if(v.data){ v.data.visibility='public_preview'; return { access:'full', presence:v.data, role:null, can_publish_as:false, can_manage:false }; }
      return null;  // not found / not public
    }
  }

  async function resolvePresence(s){
    var res;
    try { res = await c.rpc('get_presence_page_by_slug', { p_slug: s }); }
    catch(netErr){ console.error('[presence] rpc threw:', netErr); res = { error: netErr }; }
    if(res && !res.error) return res.data;          // RPC available → authoritative
    console.error('[presence] rpc error:', res && res.error);
    if(res && res.error && !rpcMissing(res.error)) throw res.error;  // real failure → surface
    console.warn('[presence] get_presence_page_by_slug unavailable — using RLS/view fallback. Apply migration 049 and RESTART the Supabase project for full server-side visibility handling.');
    return await fallbackResolve(s);
  }

  var data = null;
  try {
    data = await resolvePresence(slug);
  } catch(e){
    console.error('[presence] load failed:', e);
    stateView('Something went wrong', 'This presence could not be loaded right now. Please try again shortly.', '<a class="btn btn-ghost" href="/">Return home</a>');
    return;
  }

  // ── Access states ────────────────────────────────────────────────────────
  if(!data){ // not found / null
    stateView('Not found', 'This presence could not be found.', '<a class="btn btn-ghost" href="/">Return home</a>');
    return;
  }
  var access = data.access;

  if(access === 'locked'){
    stateView('Available inside Pegasus',
      'This presence is available inside Pegasus. Sign in or create your presence to continue.',
      '<div class="ppg-actions" style="justify-content:center">'+
        '<a class="btn btn-pri" href="/signin.html">Sign In</a>'+
        '<a class="btn btn-ghost" href="/signup.html">Create Your Presence</a></div>');
    return;
  }
  if(access === 'unavailable'){
    stateView('Unavailable', 'This presence is not available.', '<a class="btn btn-ghost" href="/">Return home</a>');
    return;
  }
  if(access !== 'full' || !data.presence){
    stateView('Not found', 'This presence could not be found.', '<a class="btn btn-ghost" href="/">Return home</a>');
    return;
  }

  // ── Full view ──────────────────────────────────────────────────────────
  var p = data.presence;
  var canManage = !!data.can_manage;
  var typeLbl = TYPE_LABEL[p.presence_type] || p.presence_type;
  var visLbl  = VIS_LABEL[p.visibility] || p.visibility;
  var statusCls = p.status==='active' ? 'b-active' : (p.status==='archived' ? 'b-cancel' : 'b-none');

  document.title = (p.name || 'Presence') + ' — Pegasus Network';

  var loc = [p.location, p.market].filter(Boolean).join(' · ');

  // 1) Hero
  var hero = '<div class="ppg-card">'+
    '<span class="ppg-type">'+esc(typeLbl)+'</span>'+
    '<div class="ppg-name">'+esc(p.name)+'</div>'+
    (p.tagline ? '<div class="ppg-tag">'+esc(p.tagline)+'</div>' : '')+
    (loc ? '<div class="ppg-meta">'+esc(loc)+'</div>' : '')+
    '<div class="ppg-badges">'+
      '<span class="badge b-none">'+esc(visLbl)+'</span>'+
      '<span class="badge '+statusCls+'" style="text-transform:capitalize">'+esc(p.status)+'</span>'+
      (canManage && data.role ? '<span class="badge b-none" style="text-transform:capitalize">Role: '+esc(data.role)+'</span>' : '')+
      (canManage && data.can_publish_as ? '<span class="badge b-trial">Publish As</span>' : '')+
    '</div></div>';

  // 2) Summary
  function row(k,v){ return '<div class="ppg-row"><div class="k">'+esc(k)+'</div><div class="v">'+v+'</div></div>'; }
  function txt(v){ return (v==null||v==='') ? '<span style="color:var(--text4)">—</span>' : esc(v); }
  var websiteV = p.website_url ? '<a href="'+safeHref(p.website_url)+'" target="_blank" rel="noopener noreferrer" style="color:var(--blue);word-break:break-all">'+esc(p.website_url)+'</a>' : '<span style="color:var(--text4)">—</span>';
  var ctaV = '<span style="color:var(--text4)">—</span>';
  if(p.public_cta_label || p.public_cta_url){
    if(p.public_cta_url) ctaV = '<a class="btn btn-ghost btn-sm" href="'+safeHref(p.public_cta_url)+'" target="_blank" rel="noopener noreferrer">'+esc(p.public_cta_label||'Open')+'</a>';
    else ctaV = esc(p.public_cta_label);
  }

  var summary = '<div class="ppg-card">'+
    '<div class="ppg-sec-label">Summary</div>'+
    (p.short_description ? '<div style="font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:14px">'+esc(p.short_description)+'</div>' : '')+
    row('Category', txt(p.category))+
    row('Industry', txt(p.industry))+
    row('Location', txt(p.location))+
    row('Market', txt(p.market))+
    row('Website', websiteV)+
    row('Call to action', ctaV)+
  '</div>';

  // 3) Presence details
  var details = '<div class="ppg-card">'+
    '<div class="ppg-sec-label">About this presence</div>'+
    '<div style="font-size:13.5px;color:var(--text2);line-height:1.7">'+
      '<p style="margin:0 0 10px">'+esc(TYPE_BLURB[p.presence_type]||'A presence represents a distinct professional identity inside Pegasus.')+'</p>'+
      '<p style="margin:0;color:var(--text3)">Presences let members participate in Pegasus under a dedicated identity — kept separate from personal profiles. Connections, deal rooms, and updates will attach to this presence in upcoming phases.</p>'+
    '</div></div>';

  // 4) Member access / future actions (placeholders) — authenticated viewers only
  var future = '';
  if(isLoggedIn()){
    future = '<div class="ppg-card">'+
      '<div class="ppg-sec-label">Member actions</div>'+
      '<div class="ppg-soon"><span>Request Introduction</span><span class="pill">Coming soon</span></div>'+
      '<div class="ppg-soon"><span>Open Deal Room</span><span class="pill">Coming soon</span></div>'+
      '<div class="ppg-soon"><span>Publish Updates</span><span class="pill">Coming soon</span></div>'+
    '</div>';
  }

  // 5) Owner controls
  var owner = '';
  if(canManage){
    owner = '<div class="ppg-card">'+
      '<div class="ppg-sec-label">Owner controls</div>'+
      '<div class="ppg-actions">'+
        '<a class="btn btn-pri" href="/my-presences.html">Edit Presence</a>'+
        '<a class="btn btn-ghost" href="/my-presences.html">Back to My Presences</a>'+
        '<button class="btn btn-ghost" onclick="presenceCopyLink()">Copy Link</button>'+
      '</div>'+
      '<div style="margin-top:12px;font-size:11px;color:var(--text4);font-family:var(--mono);word-break:break-all">'+esc(CANON+'/presence.html?slug='+p.slug)+'</div>'+
    '</div>';
  }

  main.innerHTML = hero + summary + details + future + owner;
  addFooter();

  // Copy link handler
  window.presenceCopyLink = function(){
    var url = CANON + '/presence.html?slug=' + p.slug;
    function done(){ Pegasus.toast('⧉','var(--green-dim)','Link copied', url.replace(/^https?:\/\//,'')); }
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done).catch(fallback); }
      else fallback();
    }catch(e){ fallback(); }
    function fallback(){
      try{ var ta=document.createElement('textarea'); ta.value=url; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); }
      catch(e){ alert(url); }
    }
  };
});
</script></body></html>
