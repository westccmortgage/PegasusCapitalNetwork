<!DOCTYPE html><html lang="en"><head><title>Business Page — Pegasus Network</title>
<link rel="canonical" href="https://pegasuscapitalnetwork.com/presence.html">
<!-- Presence/business pages are viewable by direct link only — not a public
     directory, and member_only/private pages must not be indexable. -->
<meta name="robots" content="noindex,nofollow">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/pegasus.css?v=dealroom-entitlements-20260524-1529">
<link rel="stylesheet" href="/css/profile-shell.css?v=dealroom-entitlements-20260524-1529">
<link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/icon-16.png">
<link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#08111C">
<style>
/* Business-page extras layered on the shared profile shell */
.ppg-state{max-width:560px;margin:90px auto;text-align:center;padding:30px}
.ppg-state h1{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:300;color:var(--text);margin-bottom:10px}
.ppg-state p{color:var(--text2);line-height:1.6;margin-bottom:22px;max-width:440px;margin-left:auto;margin-right:auto}
.ppg-soon{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);padding:10px 0;border-bottom:1px solid var(--border)}
.ppg-soon:last-child{border-bottom:none}
.ppg-soon .pill{font-size:9px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text4);border:1px solid var(--border2);border-radius:12px;padding:3px 8px;margin-left:auto}
</style>
</head><body>
<!-- PEGASUS_BUILD_VERSION = dealroom-entitlements-20260524-1529 -->
<script>window.PEGASUS_BUILD_VERSION="dealroom-entitlements-20260524-1529";</script>
<script src="/js/pegasus-config.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-supabase.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-entitlements.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-data.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-content.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-match.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-store.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-api.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-forms.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-auth.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-core.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-pages.js?v=dealroom-entitlements-20260524-1529"></script>
<script>
Pegasus.boot(async function(){
  Pegasus.mountPublic('');

  var esc = Pegasus.esc;
  var CANON = 'https://pegasuscapitalnetwork.com';

  var TYPE_LABEL = {
    personal:'Personal', company:'Company', project:'Project',
    showcase:'Showcase', event:'Event / Session', capital_program:'Capital Program',
    property:'Property / Listing', fund:'Fund / Vehicle'
  };
  var VIS_LABEL = { public_preview:'Public Preview', member_only:'Members Only', private:'Private' };

  function cap(s){ return (s||'').replace(/\b\w/g,function(c){return c.toUpperCase();}); }
  function webHref(u){ u=(u||'').trim(); if(!u) return ''; return /^[a-z][a-z0-9+.-]*:\/\//i.test(u)?u:('https://'+u.replace(/^\/+/,'')); }
  function safeHref(u){ var h=webHref(u); return Pegasus.safeUrl ? Pegasus.safeUrl(h) : h; }
  function isLoggedIn(){ try{ var st=PegStore.get(); return st && st.mode==='live' && st.user && st.user.id!=='demo'; }catch(e){ return false; } }

  var main = document.createElement('main');
  document.body.appendChild(main);
  function addFooter(){ var f=document.createElement('div'); f.innerHTML=Pegasus.footer(); if(f.firstElementChild) document.body.appendChild(f.firstElementChild); }

  function stateView(title, body, ctas){
    main.innerHTML = '<div class="ppg-state"><h1>'+esc(title)+'</h1><p>'+body+'</p>'+(ctas||'')+'</div>';
    addFooter();
  }

  // ── Resolve slug ───────────────────────────────────────────────────────────
  var slug = (new URLSearchParams(location.search)).get('slug') || '';
  slug = slug.trim();
  if(!slug){ stateView('Business page not found', 'No business page was specified.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  var c = null;
  try { c = await window.PegSB.ready; } catch(e) { c = null; }
  if(!c){ stateView('Something went wrong', 'We could not connect right now. Please try again shortly.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  // ── Data access: secure RPC first, RLS/view fallback if the RPC isn't in the
  //    API yet (049/050 not applied or PostgREST cache not reloaded). ──────────
  function rpcMissing(err){
    if(!err) return false;
    var code = err.code || '';
    var msg  = ((err.message||'')+' '+(err.details||'')+' '+(err.hint||'')).toLowerCase();
    return code==='PGRST202' || code==='404' ||
           /could not find the function|function .* does not exist|schema cache|not found/.test(msg);
  }
  async function fallbackResolve(s){
    var SAFE = 'id,presence_type,name,slug,tagline,short_description,category,industry,location,market,website_url,public_cta_label,public_cta_url,offers,looking_for,ideal_connections,visibility,status';
    if(isLoggedIn()){
      var uid=null; try{ var u=await c.auth.getUser(); uid=u&&u.data&&u.data.user&&u.data.user.id; }catch(e){}
      var q=await c.from('presences').select(SAFE).eq('slug',s).maybeSingle();
      if(q.error) console.error('[presence] fallback presences error:', q.error);
      if(q.data){
        var role=null, canPub=false, canManage=false;
        if(uid){
          var m=await c.from('presence_members').select('role,can_publish_as').eq('presence_id',q.data.id).eq('user_id',uid).maybeSingle();
          if(m && m.data){ role=m.data.role; canPub=!!m.data.can_publish_as; canManage=['owner','admin','editor'].indexOf(role)!==-1; }
        }
        return { access:'full', presence:q.data, role:role, can_publish_as:canPub, can_manage:canManage };
      }
      return { access:'unavailable' };
    } else {
      var v=await c.from('public_presence_previews').select('*').eq('slug',s).maybeSingle();
      if(v.error) console.error('[presence] fallback view error:', v.error);
      if(v.data){ v.data.visibility='public_preview'; return { access:'full', presence:v.data, role:null, can_publish_as:false, can_manage:false }; }
      return null;
    }
  }
  async function resolvePresence(s){
    var res;
    try { res = await c.rpc('get_presence_page_by_slug', { p_slug: s }); }
    catch(netErr){ console.error('[presence] rpc threw:', netErr); res = { error: netErr }; }
    if(res && !res.error) return res.data;
    console.error('[presence] rpc error:', res && res.error);
    if(res && res.error && !rpcMissing(res.error)) throw res.error;
    console.warn('[presence] get_presence_page_by_slug unavailable — using RLS/view fallback. Apply migrations 049/050 and RESTART the Supabase project.');
    return await fallbackResolve(s);
  }

  var data = null;
  try { data = await resolvePresence(slug); }
  catch(e){
    console.error('[presence] load failed:', e);
    stateView('Something went wrong', 'This business page could not be loaded right now. Please try again shortly.', '<a class="btn btn-ghost" href="/">Return home</a>');
    return;
  }

  // ── Access states ───────────────────────────────────────────────────────────
  if(!data){ stateView('Not found', 'This business page could not be found.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }
  var access = data.access;
  if(access === 'locked'){
    stateView('Available inside Pegasus',
      'This business page is available inside Pegasus. Sign in or create your own free page to continue.',
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
        '<a class="btn btn-pri" href="/signin.html">Sign In</a>'+
        '<a class="btn btn-ghost" href="/signup.html">Create Your Free Page</a></div>');
    return;
  }
  if(access === 'unavailable'){ stateView('Unavailable', 'This page is not available.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }
  if(access !== 'full' || !data.presence){ stateView('Not found', 'This business page could not be found.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  // ── Full view (profile-shell layout) ─────────────────────────────────────────
  var p = data.presence;
  var canManage = !!data.can_manage;
  var typeLbl = TYPE_LABEL[p.presence_type] || p.presence_type;
  var visLbl  = VIS_LABEL[p.visibility] || p.visibility;
  var loc = [p.location, p.market].filter(Boolean).join(' · ');
  document.title = (p.name || 'Business Page') + ' — Pegasus Network';

  var initials = (p.name||'?').trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('').toUpperCase() || '◈';

  // HERO
  var hero =
  '<section class="pp-hero">'+
    '<div class="pp-hero-grid"></div>'+
    '<div class="pp-hero-wm" aria-hidden="true">'+esc((p.name||'').slice(0,16))+'</div>'+
    '<div class="pp-hero-c">'+
      '<div class="pp-av">'+esc(initials)+'</div>'+
      '<div>'+
        '<h1 class="pp-name">'+esc(p.name)+'</h1>'+
        '<div class="pp-sub"><strong>'+esc(typeLbl)+'</strong>'+(loc?' · '+esc(loc):'')+'</div>'+
        '<div class="pp-tags">'+
          '<span class="pp-tag pp-tag-r">'+esc(typeLbl)+'</span>'+
          (p.category?'<span class="pp-tag pp-tag-m">'+esc(p.category)+'</span>':'')+
          '<span class="pp-tag '+(p.status==='active'?'pp-tag-v':'pp-tag-m')+'">'+esc(cap(p.status))+'</span>'+
          '<span class="pp-tag pp-tag-m">'+esc(visLbl)+'</span>'+
          (p.market?'<span class="pp-tag pp-tag-m">'+esc(p.market)+'</span>':'')+
        '</div>'+
        (p.tagline?'<div class="pp-tagline"><div class="pp-tagline-bar"></div><div class="pp-tagline-text">“'+esc(p.tagline)+'”</div></div>':'')+
      '</div>'+
      '<div class="pp-actions">'+
        '<button class="btn btn-ghost" onclick="presenceCopyLink()" style="color:rgba(255,255,255,.82);border-color:rgba(255,255,255,.2)">Copy Link</button>'+
        (canManage?'<a class="btn btn-ghost" href="/my-presences.html" style="color:rgba(255,255,255,.82);border-color:rgba(255,255,255,.2)">Edit Page</a>':'')+
      '</div>'+
    '</div>'+
    '<div class="pp-hero-horizon"></div>'+
  '</section>';

  // IDENTITY RAIL (quick facts)
  function railItem(label,val,dot){ return '<div class="pp-strip-item"><div class="pp-rail-label">'+(dot?'<span class="pp-rail-dot '+dot+'"></span>':'')+esc(label)+'</div><div class="pp-rail-val">'+esc(val)+'</div></div>'; }
  var rf=[ railItem('Type', typeLbl, 'blue') ];
  if(p.category) rf.push(railItem('Category', p.category));
  if(p.industry) rf.push(railItem('Industry', p.industry));
  if(loc) rf.push(railItem('Region', loc));
  rf.push(railItem('Visibility', visLbl));
  rf.push(railItem('Status', cap(p.status), p.status==='active'?'green':'gold'));
  var rail = '<div class="pp-strip"><div class="pp-strip-inner">'+rf.join('')+'</div></div>';

  // ── helpers for cards ──
  function field(label,val){ if(val==null||val==='') return ''; return '<div class="pp-field"><div><div class="pp-field-label">'+esc(label)+'</div><div class="pp-field-val">'+esc(val)+'</div></div></div>'; }
  function fieldRaw(label,html){ return '<div class="pp-field"><div><div class="pp-field-label">'+esc(label)+'</div><div class="pp-field-val">'+html+'</div></div></div>'; }
  function bizSec(label, value, hint){
    var inner;
    if(value) inner = '<div class="pp-about">'+esc(value)+'</div>';
    else if(canManage) inner = '<div style="font-size:12.5px;color:var(--text4)">'+esc(hint)+' <a href="/my-presences.html" style="color:var(--blue)">Add now →</a></div>';
    else return '';
    return '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">'+esc(label)+'</span></div><div class="pp-card-body">'+inner+'</div></div>';
  }

  // LEFT column — Details + Managed by
  var detailRows = field('Category',p.category)+field('Industry',p.industry)+field('Location',p.location)+field('Market',p.market)+
    (p.website_url?fieldRaw('Website','<a href="'+safeHref(p.website_url)+'" target="_blank" rel="noopener noreferrer" style="color:var(--blue);word-break:break-all">'+esc(p.website_url)+'</a>'):'');
  var details = detailRows ? '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">Details</span></div><div class="pp-card-body">'+detailRows+'</div></div>' : '';
  var managed = canManage ? '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">Managed by</span></div><div class="pp-card-body"><div style="font-size:12.5px;color:var(--text2)">Managed by <strong style="color:var(--text)">you</strong></div><a class="pp-card-action" href="/profile.html" style="display:inline-block;margin-top:6px">View your profile →</a></div></div>' : '';
  var leftCol = details + managed;

  // MAIN column — Focus + offerings + conversation
  var focus;
  if(p.short_description) focus = '<div class="pp-focus"><div class="pp-focus-label">What we do</div><div class="pp-focus-text">'+esc(p.short_description)+'</div></div>';
  else if(canManage) focus = '<div class="pp-focus"><div class="pp-focus-label">What we do</div><div class="pp-focus-text" style="font-size:14px;font-family:var(--sans);color:var(--text4)">Add a short description of what this business or project does. <a href="/my-presences.html" style="color:var(--blue)">Add now →</a></div></div>';
  else focus = '';

  var ctaBtn = p.public_cta_url ? '<a class="btn btn-pri" href="'+safeHref(p.public_cta_url)+'" target="_blank" rel="noopener noreferrer">'+esc(p.public_cta_label||'Learn more')+'</a>' : '';
  var convo;
  if(isLoggedIn()){
    var ctas = ['Request Introduction','I\'m Interested','I Have Capital','I Need Financing','I Have a Deal','I Want to Partner','Contact Through Pegasus'];
    convo = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">How to start a conversation</span></div><div class="pp-card-body">'+
      (ctaBtn?'<div style="margin-bottom:14px">'+ctaBtn+'</div>':'')+
      ctas.map(function(t){ return '<div class="ppg-soon"><span>'+esc(t)+'</span><span class="pill">Coming soon</span></div>'; }).join('')+
      '<div style="margin-top:10px;font-size:11px;color:var(--text4)">Introductions and messaging arrive in an upcoming phase. Personal contact details are never shown publicly.</div>'+
    '</div></div>';
  } else {
    convo = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">How to start a conversation</span></div><div class="pp-card-body">'+
      (ctaBtn?'<div style="margin-bottom:14px">'+ctaBtn+'</div>':'')+
      '<div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px">Pegasus members can connect with this page inside the network.</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap"><a class="btn btn-pri" href="/signin.html">Sign In to Connect</a><a class="btn btn-ghost" href="/signup.html">Create Your Free Page</a></div>'+
    '</div></div>';
  }
  var mainCol = focus +
    bizSec('What we offer', p.offers, 'List the products, services, capital, or deals you offer.')+
    bizSec('What we are looking for', p.looking_for, 'Say what you are looking for — clients, capital, partners, deals.')+
    bizSec('Who should connect with us', p.ideal_connections, 'Describe the people or businesses who should reach out.')+
    convo;

  // RIGHT column — Summary + actions (+ owner visibility note)
  var visExplain = {
    public_preview:'People with your link can see a limited public version of this page.',
    member_only:'Pegasus members can see this page inside the network. People with the link who aren\'t signed in see a locked preview.',
    private:'Only you and approved collaborators can see this page.'
  }[p.visibility] || '';
  var summary = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">Summary</span></div><div class="pp-card-body">'+
    field('Type',typeLbl)+field('Visibility',visLbl)+field('Status',cap(p.status))+(loc?field('Region',loc):'')+
    '<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">'+
      '<button class="btn btn-ghost btn-sm" onclick="presenceCopyLink()">Copy Link</button>'+
      (canManage?'<a class="btn btn-pri btn-sm" href="/my-presences.html">Edit Page</a>':'')+
    '</div>'+
    (canManage&&visExplain?'<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:11.5px;color:var(--text3);line-height:1.5"><strong style="color:var(--text2)">'+esc(visLbl)+':</strong> '+esc(visExplain)+'</div>':'')+
    (canManage?'<div style="margin-top:10px;font-size:10px;color:var(--text4);font-family:var(--mono);word-break:break-all">'+esc(CANON+'/presence.html?slug='+p.slug)+'</div>':'')+
  '</div></div>';
  var rightCol = summary;

  main.innerHTML = hero + rail +
    '<div class="pp-body"><div>'+leftCol+'</div><div>'+mainCol+'</div><div>'+rightCol+'</div></div>';
  addFooter();

  // Copy link handler
  window.presenceCopyLink = function(){
    var url = CANON + '/presence.html?slug=' + p.slug;
    function done(){ Pegasus.toast('⧉','var(--green-dim)','Link copied', url.replace(/^https?:\/\//,'')); }
    function fallback(){
      try{ var ta=document.createElement('textarea'); ta.value=url; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); }
      catch(e){ alert(url); }
    }
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done).catch(fallback); }
      else fallback();
    }catch(e){ fallback(); }
  };
});
</script></body></html>
