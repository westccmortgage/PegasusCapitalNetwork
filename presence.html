<!DOCTYPE html><html lang="en"><head><title>Business Page — Pegasus Network</title>
<link rel="canonical" href="https://pegasuscapitalnetwork.com/presence.html">
<!-- Presence/business pages are viewable by direct link only — not a public
     directory, and member_only/private pages must not be indexable. -->
<meta name="robots" content="noindex,nofollow">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/pegasus.css?v=dealroom-entitlements-20260524-1529">
<link rel="stylesheet" href="/css/profile-shell.css?v=dealroom-entitlements-20260524-1529">
<link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/icon-16.png">
<link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#08111C">
<style>
/* Business-page extras layered on the shared profile shell */
.ppg-state{max-width:560px;margin:90px auto;text-align:center;padding:30px}
.ppg-state h1{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:300;color:var(--text);margin-bottom:10px}
.ppg-state p{color:var(--text2);line-height:1.6;margin-bottom:22px;max-width:440px;margin-left:auto;margin-right:auto}
.ppg-soon{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);padding:10px 0;border-bottom:1px solid var(--border)}
.ppg-soon:last-child{border-bottom:none}
.ppg-soon .pill{font-size:9px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--text4);border:1px solid var(--border2);border-radius:12px;padding:3px 8px;margin-left:auto}
/* Self-contained modal styles (the .sce-* classes live in showcase.css, which
   this page does not load) — used by the owner Add/Edit Opportunity modal. */
.sce-scrim{position:fixed;inset:0;background:rgba(18,22,28,0.46);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:1000;overflow-y:auto}
.sce-modal{background:var(--bg);border:1px solid var(--border);border-radius:var(--r4);width:100%;max-width:560px;box-shadow:0 24px 70px rgba(0,0,0,.22);overflow:hidden;animation:scePop .18s ease}
@keyframes scePop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sce-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border)}
.sce-title{font-family:var(--serif);font-size:19px;font-weight:400;color:var(--text)}
.sce-x{border:none;background:var(--bg2);color:var(--text2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px}
.sce-x:hover{background:var(--bg3);color:var(--text)}
.sce-body{padding:22px 24px}
.sce-foot{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border);background:var(--bg1)}
</style>
</head><body>
<!-- PEGASUS_BUILD_VERSION = dealroom-entitlements-20260524-1529 -->
<script>window.PEGASUS_BUILD_VERSION="dealroom-entitlements-20260524-1529";</script>
<script src="/js/pegasus-config.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-supabase.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-entitlements.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-data.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-content.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-match.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-store.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-api.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-forms.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-auth.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-core.js?v=dealroom-entitlements-20260524-1529"></script>
<script src="/js/pegasus-pages.js?v=dealroom-entitlements-20260524-1529"></script>
<script>
Pegasus.boot(async function(){
  Pegasus.mountPublic('');

  var esc = Pegasus.esc;
  var CANON = 'https://pegasuscapitalnetwork.com';

  var TYPE_LABEL = {
    personal:'Personal', company:'Company', project:'Project',
    showcase:'Showcase', event:'Event / Session', capital_program:'Capital Program',
    property:'Property / Listing', fund:'Fund / Vehicle'
  };
  var VIS_LABEL = { public_preview:'Public Preview', member_only:'Members Only', private:'Private' };

  function cap(s){ return (s||'').replace(/\b\w/g,function(c){return c.toUpperCase();}); }
  function webHref(u){ u=(u||'').trim(); if(!u) return ''; return /^[a-z][a-z0-9+.-]*:\/\//i.test(u)?u:('https://'+u.replace(/^\/+/,'')); }
  function safeHref(u){ var h=webHref(u); return Pegasus.safeUrl ? Pegasus.safeUrl(h) : h; }
  function isLoggedIn(){ try{ var st=PegStore.get(); return st && st.mode==='live' && st.user && st.user.id!=='demo'; }catch(e){ return false; } }

  var main = document.createElement('main');
  document.body.appendChild(main);
  function addFooter(){ var f=document.createElement('div'); f.innerHTML=Pegasus.footer(); if(f.firstElementChild) document.body.appendChild(f.firstElementChild); }

  function stateView(title, body, ctas){
    main.innerHTML = '<div class="ppg-state"><h1>'+esc(title)+'</h1><p>'+body+'</p>'+(ctas||'')+'</div>';
    addFooter();
  }

  // ── Resolve slug ───────────────────────────────────────────────────────────
  // Resolve slug from the query (?slug=, also set by the clean-URL rewrite) OR
  // directly from a clean path like /business/<slug> or /project/<slug>.
  var slug = (new URLSearchParams(location.search)).get('slug') || '';
  if(!slug){
    var pm = location.pathname.match(/^\/(business|company|project|showcase|event|property|fund)\/([^\/?#]+)\/?$/i);
    if(pm) slug = decodeURIComponent(pm[2]);
  }
  slug = slug.trim();
  if(!slug){ stateView('Business page not found', 'No business page was specified.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  var c = null;
  try { c = await window.PegSB.ready; } catch(e) { c = null; }
  if(!c){ stateView('Something went wrong', 'We could not connect right now. Please try again shortly.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  // ── Data access: secure RPC first, RLS/view fallback if the RPC isn't in the
  //    API yet (049/050 not applied or PostgREST cache not reloaded). ──────────
  function rpcMissing(err){
    if(!err) return false;
    var code = err.code || '';
    var msg  = ((err.message||'')+' '+(err.details||'')+' '+(err.hint||'')).toLowerCase();
    return code==='PGRST202' || code==='404' ||
           /could not find the function|function .* does not exist|schema cache|not found/.test(msg);
  }
  async function fallbackResolve(s){
    // Base columns only — guaranteed to exist regardless of which presence
    // migrations are applied, so the fallback never fails on a missing optional
    // column (offers/looking_for/ideal_connections come only from the RPC path).
    var SAFE = 'id,presence_type,name,slug,tagline,short_description,category,industry,location,market,website_url,public_cta_label,public_cta_url,visibility,status';
    if(isLoggedIn()){
      var uid=null; try{ var u=await c.auth.getUser(); uid=u&&u.data&&u.data.user&&u.data.user.id; }catch(e){}
      var q=await c.from('presences').select(SAFE).eq('slug',s).maybeSingle();
      if(q.error) console.error('[presence] fallback presences error:', q.error);
      if(q.data){
        var role=null, canPub=false, canManage=false;
        if(uid){
          var m=await c.from('presence_members').select('role,can_publish_as').eq('presence_id',q.data.id).eq('user_id',uid).maybeSingle();
          if(m && m.data){ role=m.data.role; canPub=!!m.data.can_publish_as; canManage=['owner','admin','editor'].indexOf(role)!==-1; }
        }
        return { access:'full', presence:q.data, role:role, can_publish_as:canPub, can_manage:canManage };
      }
      return { access:'unavailable' };
    } else {
      var v=await c.from('public_presence_previews').select('*').eq('slug',s).maybeSingle();
      if(v.error) console.error('[presence] fallback view error:', v.error);
      if(v.data){ v.data.visibility='public_preview'; return { access:'full', presence:v.data, role:null, can_publish_as:false, can_manage:false }; }
      return null;
    }
  }
  async function resolvePresence(s){
    var res;
    try { res = await c.rpc('get_presence_page_by_slug', { p_slug: s }); }
    catch(netErr){ console.error('[presence] rpc threw:', netErr); res = { error: netErr }; }
    if(res && !res.error) return res.data;          // RPC available → authoritative
    // ANY rpc error (missing function, stale schema cache, or a column the live
    // schema doesn't have yet) → degrade to the safe RLS/view fallback rather
    // than failing the page. Apply migrations 049–051 + restart Supabase for the
    // full server-side experience (managed_by, offerings).
    console.warn('[presence] get_presence_page_by_slug failed — using RLS/view fallback. Apply migrations 049–051 and RESTART the Supabase project. Error:', res && res.error);
    return await fallbackResolve(s);
  }

  var data = null;
  try { data = await resolvePresence(slug); }
  catch(e){
    console.error('[presence] load failed:', e);
    stateView('Something went wrong', 'This business page could not be loaded right now. Please try again shortly.', '<a class="btn btn-ghost" href="/">Return home</a>');
    return;
  }

  // ── Access states ───────────────────────────────────────────────────────────
  if(!data){ stateView('Not found', 'This business page could not be found.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }
  var access = data.access;
  if(access === 'locked'){
    stateView('Available inside Pegasus',
      'This business page is available inside Pegasus. Sign in or create your own free page to continue.',
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
        '<a class="btn btn-pri" href="/signin.html">Sign In</a>'+
        '<a class="btn btn-ghost" href="/signup.html">Create Your Free Page</a></div>');
    return;
  }
  if(access === 'unavailable'){ stateView('Unavailable', 'This page is not available.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }
  if(access !== 'full' || !data.presence){ stateView('Not found', 'This business page could not be found.', '<a class="btn btn-ghost" href="/">Return home</a>'); return; }

  // ── Full view (profile-shell layout) ─────────────────────────────────────────
  var p = data.presence;
  var canManage = !!data.can_manage;
  var typeLbl = TYPE_LABEL[p.presence_type] || p.presence_type;
  var visLbl  = VIS_LABEL[p.visibility] || p.visibility;
  var loc = [p.location, p.market].filter(Boolean).join(' · ');
  document.title = (p.name || 'Business Page') + ' — Pegasus Network';
  // Clean public URL for this page (shown/copied; never the technical resolver).
  var cleanPath = Pegasus.presencePath(p.presence_type, p.slug);
  var cleanUrl = CANON + cleanPath;
  (function(){ var cl=document.querySelector('link[rel="canonical"]'); if(cl) cl.setAttribute('href', cleanUrl); })();

  var initials = (p.name||'?').trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('').toUpperCase() || '◈';
  var avHtml = p.logo_url ? '<img src="'+(Pegasus.safeUrl?Pegasus.safeUrl(p.logo_url):esc(p.logo_url))+'" alt="">' : esc(initials);

  // HERO
  var hero =
  '<section class="pp-hero">'+
    '<div class="pp-hero-grid"></div>'+
    '<div class="pp-hero-wm" aria-hidden="true">'+esc((p.name||'').slice(0,16))+'</div>'+
    '<div class="pp-hero-c">'+
      '<div class="pp-av">'+avHtml+'</div>'+
      '<div>'+
        '<h1 class="pp-name">'+esc(p.name)+'</h1>'+
        '<div class="pp-sub"><strong>'+esc(typeLbl)+'</strong>'+(loc?' · '+esc(loc):'')+'</div>'+
        '<div class="pp-tags">'+
          '<span class="pp-tag pp-tag-r">'+esc(typeLbl)+'</span>'+
          (p.category?'<span class="pp-tag pp-tag-m">'+esc(p.category)+'</span>':'')+
          '<span class="pp-tag '+(p.status==='active'?'pp-tag-v':'pp-tag-m')+'">'+esc(cap(p.status))+'</span>'+
          '<span class="pp-tag pp-tag-m">'+esc(visLbl)+'</span>'+
          (p.market?'<span class="pp-tag pp-tag-m">'+esc(p.market)+'</span>':'')+
        '</div>'+
        (p.tagline?'<div class="pp-tagline"><div class="pp-tagline-bar"></div><div class="pp-tagline-text">“'+esc(p.tagline)+'”</div></div>':'')+
      '</div>'+
      '<div class="pp-actions">'+
        '<button class="btn btn-ghost" onclick="presenceCopyLink()" style="color:rgba(255,255,255,.82);border-color:rgba(255,255,255,.2)">Copy Link</button>'+
        (canManage?'<a class="btn btn-ghost" href="/my-presences.html" style="color:rgba(255,255,255,.82);border-color:rgba(255,255,255,.2)">Edit Page</a>':'')+
      '</div>'+
    '</div>'+
    '<div class="pp-hero-horizon"></div>'+
  '</section>';

  // IDENTITY RAIL (quick facts)
  function railItem(label,val,dot){ return '<div class="pp-strip-item"><div class="pp-rail-label">'+(dot?'<span class="pp-rail-dot '+dot+'"></span>':'')+esc(label)+'</div><div class="pp-rail-val">'+esc(val)+'</div></div>'; }
  var rf=[ railItem('Type', typeLbl, 'blue') ];
  if(p.category) rf.push(railItem('Category', p.category));
  if(p.industry) rf.push(railItem('Industry', p.industry));
  if(loc) rf.push(railItem('Region', loc));
  rf.push(railItem('Visibility', visLbl));
  rf.push(railItem('Status', cap(p.status), p.status==='active'?'green':'gold'));
  var rail = '<div class="pp-strip"><div class="pp-strip-inner">'+rf.join('')+'</div></div>';

  // ── helpers for cards ──
  function field(label,val){ if(val==null||val==='') return ''; return '<div class="pp-field"><div><div class="pp-field-label">'+esc(label)+'</div><div class="pp-field-val">'+esc(val)+'</div></div></div>'; }
  function fieldRaw(label,html){ return '<div class="pp-field"><div><div class="pp-field-label">'+esc(label)+'</div><div class="pp-field-val">'+html+'</div></div></div>'; }
  function bizSec(label, value, hint){
    var inner;
    if(value) inner = '<div class="pp-about">'+esc(value)+'</div>';
    else if(canManage) inner = '<div style="font-size:12.5px;color:var(--text4)">'+esc(hint)+' <a href="/my-presences.html" style="color:var(--blue)">Add now →</a></div>';
    else return '';
    return '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">'+esc(label)+'</span></div><div class="pp-card-body">'+inner+'</div></div>';
  }

  // ── Managed by / Represented by — a clear relationship card (never owner_user_id)
  var mb = data.managed_by || {};
  var managed = '';
  if(mb.generic){
    managed = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">Managed by</span></div><div class="pp-card-body"><div style="font-size:13px;color:var(--text2)">Connected Pegasus member</div></div></div>';
  } else if(mb.name){
    var mbLink = mb.you ? '/profile.html' : (mb.slug ? '/u/'+encodeURIComponent(mb.slug) : '');
    var mbInit = (mb.name||'?').trim().split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
    managed = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">'+(mb.you?'Managed by':'Represented by')+'</span></div><div class="pp-card-body">'+
      '<div style="display:flex;align-items:center;gap:11px">'+
        '<div style="width:40px;height:40px;border-radius:50%;background:var(--blue-dim);border:1px solid rgba(58,143,232,.2);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--blue-lt);font-size:13px;flex-shrink:0">'+esc(mbInit)+'</div>'+
        '<div style="min-width:0"><div style="font-size:14px;font-weight:600;color:var(--text)">'+(mb.you?'You':esc(mb.name))+'</div>'+
        (mbLink?'<a class="pp-card-action" href="'+mbLink+'">View profile →</a>':'')+'</div>'+
      '</div></div></div>';
  }

  // ── MAIN column — what we do / offer / looking / connect / opportunities / talk
  var focus;
  if(p.short_description) focus = '<div class="pp-focus"><div class="pp-focus-label">What we do</div><div class="pp-focus-text">'+esc(p.short_description)+'</div></div>';
  else if(canManage) focus = '<div class="pp-focus"><div class="pp-focus-label">What we do</div><div class="pp-focus-text" style="font-size:14px;font-family:var(--sans);color:var(--text4)">Add a short description of what this business or project does. <a href="/my-presences.html" style="color:var(--blue)">Add now →</a></div></div>';
  else focus = '';

  var ctaBtn = p.public_cta_url ? '<a class="btn btn-pri" href="'+safeHref(p.public_cta_url)+'" target="_blank" rel="noopener noreferrer">'+esc(p.public_cta_label||'Learn more')+'</a>' : '';
  var convo;
  if(isLoggedIn()){
    convo = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">How to start a conversation</span></div><div class="pp-card-body">'+
      (ctaBtn?'<div style="margin-bottom:12px">'+ctaBtn+'</div>':'')+
      (canManage
        ? '<div style="font-size:12.5px;color:var(--text4)">When members express interest in this page, their requests appear in your <a href="/dashboard.html#requests" style="color:var(--blue)">Workspace</a>.</div>'
        : '<div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px">Reach out to the team behind this page. Pegasus shares your profile so they can respond — your private contact details are never shown.</div>'+
          '<button class="btn btn-pri" onclick="psEngage()">Express Interest / Connect</button>')+
    '</div></div>';
  } else {
    convo = '<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label-serif">How to start a conversation</span></div><div class="pp-card-body">'+
      (ctaBtn?'<div style="margin-bottom:14px">'+ctaBtn+'</div>':'')+
      '<div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px">Pegasus members can connect with this page inside the network.</div>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap"><a class="btn btn-pri" href="/signin.html">Sign In to Connect</a><a class="btn btn-ghost" href="/signup.html">Create Your Free Page</a></div>'+
    '</div></div>';
  }
  // Featured Opportunities — real deal/listing/project cards, loaded async below.
  var oppsSec = '<div id="ps-opps"></div>';

  var mainCol = focus +
    bizSec('What we offer', p.offers, 'List the products, services, capital, or deals you offer.')+
    bizSec('What we are looking for', p.looking_for, 'Say what you are looking for — clients, capital, partners, deals.')+
    bizSec('Who should connect with us', p.ideal_connections, 'Describe the people or businesses who should reach out.')+
    oppsSec +
    convo;

  // ── RIGHT context column — Managed by + Network Signals + Suggested Next Steps
  var steps;
  if(canManage){
    var sSteps=[];
    if(!p.offers) sSteps.push('Add what you offer');
    if(!p.looking_for) sSteps.push('Add what you are looking for');
    if(!p.ideal_connections) sSteps.push('Add who should connect with you');
    sSteps.push('Add your first opportunity');
    sSteps.push('Share this business page');
    steps='<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">Suggested next steps</span></div><div class="pp-card-body">'+
      sSteps.map(function(s){return '<div style="font-size:12.5px;color:var(--text2);padding:7px 0;border-bottom:1px solid var(--border)">'+esc(s)+'</div>';}).join('')+
      '<div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">'+
        '<a class="btn btn-pri btn-sm" href="/my-presences.html">Edit Page</a>'+
        '<button class="btn btn-ghost btn-sm" onclick="presenceCopyLink()">Copy Link</button>'+
      '</div></div></div>';
  } else {
    var vActions='';
    if(mb.name && mb.slug) vActions+='<a class="btn btn-ghost btn-sm" href="/u/'+encodeURIComponent(mb.slug)+'">View Manager Profile</a>';
    if(p.website_url) vActions+='<a class="btn btn-ghost btn-sm" href="'+safeHref(p.website_url)+'" target="_blank" rel="noopener noreferrer">Visit Website</a>';
    vActions+='<button class="btn btn-ghost btn-sm" onclick="presenceCopyLink()">Copy Link</button>';
    steps='<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">Next steps</span></div><div class="pp-card-body"><div style="display:flex;flex-direction:column;gap:8px">'+vActions+'</div>'+
      '<div class="ppg-soon" style="margin-top:10px"><span>Request Introduction</span><span class="pill">Coming soon</span></div></div></div>';
  }
  var rightCol = managed + '<div id="ps-signals"></div>' + steps;

  main.innerHTML = hero + rail +
    '<div class="pp-body" style="grid-template-columns:1fr 320px">'+
      '<div>'+mainCol+'</div>'+
      '<div>'+rightCol+'</div>'+
    '</div>';
  addFooter();

  /* Network Signals — movement around the ecosystem (visibility-safe). Hidden if
     there's nothing safe to show. */
  (async function loadPsSignals(){
    try{
      var host=document.getElementById('ps-signals'); if(!host) return;
      var rr=await c.rpc('get_recent_network_activity');
      var items=(rr && !rr.error && rr.data) ? rr.data : [];
      if(!items.length){ host.parentNode && host.parentNode.removeChild(host); return; }
      var TL={person:'Person',company:'Company',project:'Project',showcase:'Showcase',event:'Event',capital_program:'Capital Program',property:'Property',fund:'Fund'};
      var rows=items.slice(0,6).map(function(a){
        var isPerson=a.kind==='person';
        var href=isPerson ? (a.url||'#') : Pegasus.presencePath(a.kind,a.slug);
        var kind=TL[a.kind]||a.kind;
        var sub=(a.meta||'')+(a.location?((a.meta?' · ':'')+a.location):'');
        var ini=(a.name||'—').split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('');
        return '<a href="'+esc(href)+'" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);text-decoration:none">'+
          '<div style="width:30px;height:30px;border-radius:'+(isPerson?'50%':'8px')+';background:var(--blue-dim);border:1px solid rgba(58,143,232,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--blue-lt);flex-shrink:0">'+esc(ini)+'</div>'+
          '<div style="min-width:0;flex:1"><div style="font-size:8.5px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--blue-lt)">'+esc(kind)+'</div>'+
          '<div style="font-size:12.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(a.name||'—')+'</div>'+
          (sub?'<div style="font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(sub)+'</div>':'')+'</div></a>';
      }).join('');
      host.innerHTML='<div class="pp-card"><div class="pp-card-head"><span class="pp-card-label">Network Signals</span></div><div class="pp-card-body" style="padding-top:4px"><div style="font-size:11px;color:var(--text3);margin-bottom:6px">Movement inside Pegasus.</div>'+rows+'</div></div>';
    }catch(e){ var h=document.getElementById('ps-signals'); if(h && h.parentNode) h.parentNode.removeChild(h); }
  })();

  /* Featured Opportunities — the specific deals, projects, and listings this
     business presents. Loaded via the visibility-safe RPC; managers also get an
     "Add Opportunity" action and per-card manage controls. Degrades gracefully:
     if migration 054 isn't applied yet, the section simply hides (managers see a
     soft prompt). Opportunities NEVER live on a personal profile — only here. */
  var OPP_TYPE = { opportunity:'Opportunity', project:'Project', listing:'Listing', property:'Property', capital_request:'Capital Request', fund:'Fund', deal:'Deal', event:'Event', other:'Opportunity' };
  var OPP_VIS  = { public_preview:'Public', member_only:'Members only', private:'Private' };

  function oppCard(o){
    var href = Pegasus.opportunityPath ? Pegasus.opportunityPath(o.slug) : ('/opportunity/'+encodeURIComponent(o.slug));
    var tlabel = OPP_TYPE[o.opportunity_type] || 'Opportunity';
    var meta = [o.amount_label, o.location, o.market, o.category].filter(Boolean).map(function(m){return esc(m);}).join(' · ');
    var visTag = (canManage && o.visibility && o.visibility!=='public_preview')
      ? '<span style="font-size:8.5px;font-family:var(--mono);letter-spacing:.07em;text-transform:uppercase;color:var(--text4);border:1px solid var(--border2);border-radius:10px;padding:2px 7px;margin-left:auto">'+esc(OPP_VIS[o.visibility]||o.visibility)+'</span>'
      : '';
    var manage = canManage
      ? '<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="oppEdit(\''+esc(o.id)+'\')">Edit</button><button class="btn btn-ghost btn-sm" onclick="oppArchive(\''+esc(o.id)+'\')">Archive</button></div>'
      : '';
    return '<div style="padding:13px 0;border-bottom:1px solid var(--border)">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px"><span style="font-size:8.5px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--blue-lt)">'+esc(tlabel)+'</span>'+visTag+'</div>'+
      '<a href="'+esc(href)+'" style="font-size:15px;font-weight:600;color:var(--text);text-decoration:none;display:block">'+esc(o.title)+'</a>'+
      (o.summary?'<div style="font-size:12.5px;color:var(--text2);line-height:1.55;margin-top:3px">'+esc(o.summary)+'</div>':'')+
      (meta?'<div style="font-size:11px;color:var(--text3);margin-top:5px">'+meta+'</div>':'')+
      '<a href="'+esc(href)+'" class="pp-card-action" style="margin-top:6px;display:inline-block">View opportunity →</a>'+
      manage+
    '</div>';
  }

  function renderOpps(list){
    var host=document.getElementById('ps-opps'); if(!host) return;
    list = list || [];
    if(!list.length && !canManage){ host.innerHTML=''; return; }
    var addBtn = canManage ? '<button class="btn btn-ghost btn-sm" onclick="oppCreate()" style="margin-left:auto">+ Add Opportunity</button>' : '';
    var body;
    if(list.length){
      var rows = list.map(oppCard).join('');
      body = '<div style="margin-top:-13px">'+rows+'</div>';
    } else {
      body = '<div style="font-size:12.5px;color:var(--text4)">Add your first opportunity so people can see the specific deals, projects, or listings this business presents.</div>';
    }
    host.innerHTML = '<div class="pp-card"><div class="pp-card-head" style="display:flex;align-items:center"><span class="pp-card-label-serif">Featured Opportunities</span>'+addBtn+'</div><div class="pp-card-body">'+body+'</div></div>';
  }

  var _opps = [];
  (async function loadOpps(){
    try{
      var rr = await c.rpc('get_opportunities_for_presence', { p_slug: slug });
      _opps = (rr && !rr.error && Array.isArray(rr.data)) ? rr.data : [];
      if(rr && rr.error) console.warn('[presence] get_opportunities_for_presence failed — apply migration 054 + restart Supabase. Error:', rr.error);
    }catch(e){ console.warn('[presence] opportunities load threw:', e); _opps=[]; }
    renderOpps(_opps);
  })();

  // ── Owner: create / edit / archive opportunities ──────────────────────────
  function oppFormModal(title, o){
    o = o || {};
    function f(id,label,val,ph){ return '<div style="margin-bottom:12px"><label style="display:block;font-size:11px;color:var(--text3);margin-bottom:5px">'+esc(label)+'</label><input id="'+id+'" type="text" value="'+esc(val||'')+'" placeholder="'+esc(ph||'')+'" style="width:100%;padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px"></div>'; }
    function ta(id,label,val,ph){ return '<div style="margin-bottom:12px"><label style="display:block;font-size:11px;color:var(--text3);margin-bottom:5px">'+esc(label)+'</label><textarea id="'+id+'" rows="3" placeholder="'+esc(ph||'')+'" style="width:100%;padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;resize:vertical">'+esc(val||'')+'</textarea></div>'; }
    var typeOpts = Object.keys(OPP_TYPE).map(function(k){ return '<option value="'+k+'"'+(o.opportunity_type===k?' selected':'')+'>'+esc(OPP_TYPE[k])+'</option>'; }).join('');
    var visKeys = ['public_preview','member_only','private'];
    var visOpts = visKeys.map(function(k){ return '<option value="'+k+'"'+((o.visibility||'public_preview')===k?' selected':'')+'>'+esc(OPP_VIS[k])+'</option>'; }).join('');
    var sel = function(id,label,opts){ return '<div style="margin-bottom:12px"><label style="display:block;font-size:11px;color:var(--text3);margin-bottom:5px">'+esc(label)+'</label><select id="'+id+'" style="width:100%;padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px">'+opts+'</select></div>'; };
    var inner =
      f('opp_title','Title','title' in o?o.title:'','e.g. $5M Bridge Loan Pool — Miami')+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+sel('opp_type','Type',typeOpts)+sel('opp_vis','Visibility',visOpts)+'</div>'+
      ta('opp_summary','Short summary',o.summary,'One line people see on the card.')+
      ta('opp_description','Description',o.description,'The full details shown on the opportunity page.')+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+f('opp_amount','Amount / size',o.amount_label,'$5M')+f('opp_category','Category',o.category,'Debt, Equity, Listing…')+'</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+f('opp_location','Location',o.location,'Miami, FL')+f('opp_market','Market',o.market,'CRE, Residential…')+'</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+f('opp_cta_label','Call-to-action label',o.cta_label,'Request access')+f('opp_cta_url','Call-to-action URL',o.cta_url,'https://…')+'</div>';
    var saveBtn = '<button class="btn btn-pri" id="opp_save">'+(o.id?'Save changes':'Create opportunity')+'</button>';
    var footer = '<button class="btn btn-ghost" onclick="Pegasus.closeModal()">Cancel</button>'+saveBtn;
    Pegasus.modal(
      '<div class="sce-scrim" onclick="if(event.target===this)Pegasus.closeModal()"><div class="sce-modal" style="max-width:560px">'+
        '<div class="sce-head"><div class="sce-title">'+esc(title)+'</div><button class="sce-x" onclick="Pegasus.closeModal()" aria-label="Close">✕</button></div>'+
        '<div class="sce-body" style="max-height:70vh;overflow-y:auto">'+inner+'</div>'+
        '<div class="sce-foot">'+footer+'</div>'+
      '</div></div>'
    );
    var gv=function(id){ var e=document.getElementById(id); return e?e.value:''; };
    document.getElementById('opp_save').onclick = async function(){
      var btn=this; var titleV=(gv('opp_title')||'').trim();
      if(!titleV){ Pegasus.toast('!','var(--gold-dim)','Title required','Give this opportunity a title.'); return; }
      btn.disabled=true; btn.textContent='Saving…';
      try{
        if(o.id){
          var ur = await c.rpc('update_opportunity', { p_id:o.id, p_title:titleV, p_opportunity_type:gv('opp_type'), p_summary:gv('opp_summary'), p_description:gv('opp_description'), p_category:gv('opp_category'), p_location:gv('opp_location'), p_market:gv('opp_market'), p_amount_label:gv('opp_amount'), p_cta_label:gv('opp_cta_label'), p_cta_url:gv('opp_cta_url'), p_visibility:gv('opp_vis'), p_status:null });
          if(ur && ur.error) throw ur.error;
        } else {
          var cr = await c.rpc('create_opportunity', { p_presence_id:p.id, p_title:titleV, p_opportunity_type:gv('opp_type'), p_summary:gv('opp_summary'), p_description:gv('opp_description'), p_category:gv('opp_category'), p_location:gv('opp_location'), p_market:gv('opp_market'), p_amount_label:gv('opp_amount'), p_cta_label:gv('opp_cta_label'), p_cta_url:gv('opp_cta_url'), p_visibility:gv('opp_vis') });
          if(cr && cr.error) throw cr.error;
        }
        Pegasus.closeModal();
        var rr = await c.rpc('get_opportunities_for_presence', { p_slug: slug });
        _opps = (rr && !rr.error && Array.isArray(rr.data)) ? rr.data : _opps;
        renderOpps(_opps);
        Pegasus.toast('✓','var(--green-dim)','Saved', o.id?'Opportunity updated.':'Opportunity published.');
      }catch(err){
        console.error('[presence] opportunity save failed:', err);
        var m=(err&&err.message)||'Could not save. Apply migration 054 and restart Supabase, then try again.';
        Pegasus.toast('!','var(--gold-dim)','Could not save', m);
        btn.disabled=false; btn.textContent=o.id?'Save changes':'Create opportunity';
      }
    };
  }
  window.oppCreate = function(){
    try{ oppFormModal('Add an opportunity', null); }
    catch(err){ console.error('[presence] could not open opportunity form:', err); Pegasus.toast('!','var(--gold-dim)','Could not open form','Please refresh and try again.'); }
  };
  window.oppEdit = function(id){
    try{ var o=_opps.filter(function(x){return x.id===id;})[0]; oppFormModal('Edit opportunity', o||{ id:id }); }
    catch(err){ console.error('[presence] could not open opportunity form:', err); Pegasus.toast('!','var(--gold-dim)','Could not open form','Please refresh and try again.'); }
  };
  window.oppArchive = async function(id){
    if(!confirm('Archive this opportunity? It will no longer be shown publicly.')) return;
    try{
      var ar=await c.rpc('archive_opportunity', { p_id:id }); if(ar && ar.error) throw ar.error;
      var rr = await c.rpc('get_opportunities_for_presence', { p_slug: slug });
      _opps = (rr && !rr.error && Array.isArray(rr.data)) ? rr.data : _opps.filter(function(x){return x.id!==id;});
      renderOpps(_opps);
      Pegasus.toast('✓','var(--green-dim)','Archived','Opportunity archived.');
    }catch(err){ console.error('[presence] archive failed:', err); Pegasus.toast('!','var(--gold-dim)','Could not archive', (err&&err.message)||'Try again.'); }
  };

  // Engage handler — express interest in this business page.
  window.psEngage = function(){ Pegasus.engageOpen({ presenceId: p.id, name: p.name }); };

  // Copy link handler
  window.presenceCopyLink = function(){
    var url = cleanUrl;
    function done(){ Pegasus.toast('⧉','var(--green-dim)','Link copied', url.replace(/^https?:\/\//,'')); }
    function fallback(){
      try{ var ta=document.createElement('textarea'); ta.value=url; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); }
      catch(e){ alert(url); }
    }
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done).catch(fallback); }
      else fallback();
    }catch(e){ fallback(); }
  };
});
</script></body></html>
