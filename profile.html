<!DOCTYPE html>
<html lang="en">
<head>
<title>My Profile — Pegasus Network</title>
<link rel="canonical" href="https://pegasuscapitalnetwork.com/profile.html"><meta name="robots" content="noindex,nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="/css/pegasus.css">
<link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
<!--
  PROFILE BRIDGE — /profile.html is no longer a primary destination.
  Per the Pegasus routing law it redirects every visitor to the canonical
  public profile route /u/{slug}. Anonymous visitors are sent to sign in.
  A fast synchronous localStorage path avoids any flash; a Supabase fallback
  resolves the slug for the rare case it isn't cached yet.
-->
<script>
(function(){
  function go(u){ try{ location.replace(u); }catch(e){ location.href=u; } }
  /* Fast path — cached session + slug (no flash) */
  try{
    var raw=localStorage.getItem('pegasus.auth');
    var pj=raw?JSON.parse(raw):null;
    var tok=pj && (pj.access_token||(pj.currentSession&&pj.currentSession.access_token));
    if(!tok){ go('/signin.html'); return; }
    var slug=localStorage.getItem('peg_slug')||'';
    if(slug){ go('/u/'+slug); return; }
  }catch(e){}
  /* Slow path — resolve slug via Supabase once the client is ready */
  window.__PEG_BRIDGE_RESOLVE=true;
})();
</script>
</head>
<body>
<div style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:'IBM Plex Sans',system-ui,sans-serif;color:#9FB2CC;text-align:center;padding:40px">
  <img src="/assets/brand/pegasus-symbol.svg" alt="Pegasus" style="width:44px;height:44px;opacity:.85">
  <div style="font-size:14px">Opening your profile…</div>
  <noscript><a href="/dashboard.html" style="color:#5EA0E0">Continue to your workspace →</a></noscript>
</div>
<script src="/js/pegasus-config.js"></script>
<script src="/js/pegasus-supabase.js"></script>
<script>
(async function(){
  if(!window.__PEG_BRIDGE_RESOLVE) return;
  try{
    var sb=await window.PegSB.ready;
    if(!sb){ location.replace('/signin.html'); return; }
    var ures=await sb.auth.getUser();
    var u=ures && ures.data && ures.data.user;
    if(!u){ location.replace('/signin.html'); return; }
    var pr=await sb.from('profiles').select('profile_slug').eq('id',u.id).maybeSingle();
    var slug=pr && pr.data && pr.data.profile_slug;
    if(slug){ try{ localStorage.setItem('peg_slug',slug); }catch(e){} location.replace('/u/'+slug); }
    else { location.replace('/public-profile.html?id='+u.id); }
  }catch(e){ location.replace('/dashboard.html'); }
})();
</script>
</body>
</html>
