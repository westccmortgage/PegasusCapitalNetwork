<!DOCTYPE html><html lang="en"><head><title>Set New Password — Pegasus Network</title>
<link rel="canonical" href="https://pegasuscapitalnetwork.com/reset-password.html"><meta name="robots" content="noindex,nofollow"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="/css/pegasus.css"><link rel="icon" href="/assets/brand/favicon.ico" sizes="any"><link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/icon-32.png"><link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png"><link rel="manifest" href="/site.webmanifest"><meta name="theme-color" content="#08111C"></head><body>
<script src="/js/pegasus-config.js"></script>
<script src="/js/pegasus-supabase.js"></script>
<script src="/js/pegasus-entitlements.js"></script>
<script src="/js/pegasus-data.js"></script>
<script src="/js/pegasus-content.js"></script>
<script src="/js/pegasus-match.js"></script>
<script src="/js/pegasus-store.js"></script>
<script src="/js/pegasus-api.js"></script>
<script src="/js/pegasus-forms.js"></script>
<script src="/js/pegasus-auth.js"></script>
<script src="/js/pegasus-core.js"></script>
<script src="/js/pegasus-billing.js"></script>
<script src="/js/pegasus-pages.js"></script>
<script>
Pegasus.mountPublic('');
var main=document.createElement('main'); main.className='fade'; document.body.appendChild(main);
main.innerHTML='<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px">'
  +'<div class="auth-card"><div class="auth-head"><div class="auth-icon">🔐</div>'
  +'<div class="auth-title">Set a new password</div>'
  +'<div class="auth-sub" id="np_sub">Verifying your reset link…</div></div>'
  +'<div class="auth-body" id="np_body" style="display:none">'
  +'<div class="field"><label class="label" for="np_pw">New Password</label><div class="pw-wrap"><input class="input" type="password" id="np_pw" placeholder="At least 8 characters" autocomplete="new-password"><button class="pw-toggle" type="button" aria-label="Show password" title="Show password">&#128065;</button></div></div>'
  +'<div class="field"><label class="label" for="np_pw2">Confirm New Password</label><div class="pw-wrap"><input class="input" type="password" id="np_pw2" placeholder="Re-enter your new password" autocomplete="new-password"><button class="pw-toggle" type="button" aria-label="Show password" title="Show password">&#128065;</button></div></div>'
  +'<div id="np_err" style="color:var(--red);font-size:11px;font-family:var(--mono);min-height:14px"></div>'
  +'<button class="btn btn-pri" id="np_btn" style="width:100%;justify-content:center;margin-top:4px" onclick="window.doSetPassword()">Update Password &#8594;</button>'
  +'</div>'
  +'<div class="auth-body" id="np_done" style="display:none;text-align:center">'
  +'<div style="font-size:40px;margin:8px 0">&#10003;</div>'
  +'<div style="font-size:14px;color:var(--green);margin-bottom:6px">Password updated</div>'
  +'<div style="font-size:12px;color:var(--text2);margin-bottom:16px">You can now use your new password to sign in.</div>'
  +'<a class="btn btn-pri" href="/dashboard.html" style="width:100%;justify-content:center">Go to Dashboard &#8594;</a>'
  +'</div>'
  +'<div class="auth-body" id="np_invalid" style="display:none;text-align:center">'
  +'<div style="font-size:13px;color:var(--text2);margin-bottom:14px">This reset link is invalid or has expired. Request a new one to continue.</div>'
  +'<a class="btn btn-pri" href="/forgot-password.html" style="width:100%;justify-content:center">Request New Reset Link &#8594;</a>'
  +'<a class="auth-alt" href="/signin.html">&#8592; Back to Sign In</a>'
  +'</div>'
  +'</div></div>';
var f=document.createElement('div'); f.innerHTML=Pegasus.footer(); document.body.appendChild(f.firstElementChild);

function show(which){
  ['np_body','np_done','np_invalid'].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display='none'; });
  var t=document.getElementById(which); if(t) t.style.display='block';
}

(async function(){
  var sub=document.getElementById('np_sub');
  var c=await window.PegSB.ready;
  if(!c){ sub.textContent='Service unavailable. Please try again later.'; show('np_invalid'); return; }

  var ready=false;
  function markReady(){ if(ready) return; ready=true; sub.textContent='Choose a new password for your account.'; show('np_body'); var p=document.getElementById('np_pw'); if(p) p.focus(); }

  c.auth.onAuthStateChange(function(event){
    if(event==='PASSWORD_RECOVERY' || event==='SIGNED_IN'){ markReady(); }
  });

  try{
    var res=await c.auth.getSession();
    if(res && res.data && res.data.session){ markReady(); }
  }catch(e){}

  setTimeout(function(){
    if(!ready){ sub.textContent='Reset link could not be verified.'; show('np_invalid'); }
  }, 3500);
}());

window.doSetPassword=async function(){
  var pw=document.getElementById('np_pw').value;
  var pw2=document.getElementById('np_pw2').value;
  var err=document.getElementById('np_err'); err.textContent='';
  if(!pw || pw.length<8){ err.textContent='Password must be at least 8 characters.'; return; }
  if(pw!==pw2){ err.textContent='Passwords do not match.'; return; }
  var btn=document.getElementById('np_btn'); btn.disabled=true; btn.textContent='Updating…';
  try{
    var c=await window.PegSB.ready;
    var r=await c.auth.updateUser({password:pw});
    if(r.error) throw r.error;
    show('np_done');
    document.getElementById('np_sub').textContent='All set.';
  }catch(e){
    err.textContent=(e&&e.message)||'Could not update password. Please try again.';
    btn.disabled=false; btn.textContent='Update Password \u2192';
  }
};
document.title='Set New Password — Pegasus Network';
</script></body></html>
