<script>
const v=Pegasus.mountApp({active:'Deal Rooms',title:'RWA Project Workspace',sub:'Riverside Apartments · Tokenization'});
var WF=['Intake','Readiness','Legal Structure','Issuance','Distribution','Secondary'];
var flow='<div class="flow" style="margin-bottom:16px">'+WF.map(function(w,i){return '<div class="flow-i '+(i<2?'done':i===2?'active':'')+'"><div class="flow-line"></div><div class="flow-node">'+(i<2?'✓':i+1)+'</div><div class="flow-lbl">'+w+'</div></div>';}).join('')+'</div>';
v.insertAdjacentHTML('beforeend',flow);
(async function(){try{
    var id=new URLSearchParams(location.search).get('id');
    var metrics=[['—','Asset Value','var(--blue)'],['—','Target Raise','var(--teal)'],['Reg D','Structure','var(--green)'],['—','Readiness','var(--amber)']];
    if(id){var c=await window.PegSB.ready; if(c){var {data}=await c.from('rwa_project_intakes').select('*').eq('id',id).maybeSingle(); if(data){metrics[0][0]=data.asset_value?'$'+Number(data.asset_value).toLocaleString():'—'; metrics[1][0]=data.target_raise?'$'+Number(data.target_raise).toLocaleString():'—';}}}
    v.insertAdjacentHTML('beforeend','<div class="grid g4" style="margin-bottom:16px">'+metrics.map(function(s){return '<div class="stat" style="--accent:'+s[2]+'"><div class="stat-v" style="font-size:20px">'+s[0]+'</div><div class="stat-l">'+s[1]+'</div></div>';}).join('')+'</div>');
  }catch(e){v.insertAdjacentHTML('beforeend','<div style="padding:12px;font-size:12px;color:var(--text3)">Project data loads from Supabase.</div>');}})();
v.insertAdjacentHTML('beforeend','<div class="grid g2"><div class="card"><div class="card-head"><div class="card-title">Readiness Checklist</div></div><div class="card-body">'+[['Asset valuation','Verified','tag-g'],['Title & legal review','Verified','tag-g'],['Securities structure','In review','tag-a'],['Custody arrangement','Pending','tag-b'],['Offering documents','Pending','tag-b']].map(function(c){return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--text2)">'+c[0]+'</span><span class="tag '+c[2]+'">'+c[1]+'</span></div>';}).join('')+'</div></div><div class="card"><div class="card-head"><div class="card-title">RWA Partners Engaged</div></div><div class="card-body">'+[['Your Company','Issuance Platform','TR'],['Lex Digital Trust','Legal & Securities','LD']].map(function(p){return '<div style="display:flex;gap:11px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)"><div class="avatar">'+p[2]+'</div><div><div style="font-size:12px;font-weight:600">'+p[0]+'</div><div style="font-size:9px;color:var(--text3);font-family:var(--mono)">'+p[1]+'</div></div></div>';}).join('')+'</div></div></div>');
</script></body></html>
