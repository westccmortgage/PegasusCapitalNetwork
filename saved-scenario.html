<script>
const v=Pegasus.mountApp({active:'Dashboard',title:'Saved Scenarios',sub:'Your modeled deals'});
var sc=[];  // loads from Supabase capital_scenarios table
(async function(){
    try{
      var c=await window.PegSB.ready;
      if(c){var {data}=await c.from('capital_scenarios').select('*').eq('user_id',(Pegasus.store.get().user||{}).id).order('created_at',{ascending:false}); if(data&&data.length){sc=data.map(function(d){return [d.name||'Saved Scenario',d.property_type||'Capital Request','DSCR '+(d.dscr||'—'),'Scenario','tag-b'];});}}
    }catch(e){}
    if(sc.length){
      v.insertAdjacentHTML('beforeend','<div class="grid g4" style="margin-bottom:16px"><div class="stat" style="--accent:var(--blue)"><div class="stat-v">'+sc.length+'</div><div class="stat-l">Saved Scenarios</div></div></div>'+
        '<div class="card"><div class="card-body">'+sc.map(function(d){return '<div class="kv"><span class="kv-k">'+d[0]+'</span><span class="kv-v">'+d[3]+'</span></div>';}).join('')+'</div></div>');
    } else {
      v.insertAdjacentHTML('beforeend','<div class="card" style="padding:48px;text-align:center"><div style="font-size:28px;margin-bottom:14px">◈</div><div style="font-family:var(--serif);font-weight:300;font-size:20px;margin-bottom:10px">No saved scenarios yet</div><div style="font-size:13px;color:var(--text2);margin-bottom:22px">Use the Capital Strategy Simulator to explore financing scenarios and save them here.</div><a class="btn btn-pri" href="/capital-strategy-simulator.html">Open Simulator →</a></div>');
    }
  })();
</script></body></html>
