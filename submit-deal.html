<script>
PegPages.mountContent('submit-deal',()=>PegPages.form({key:'submit-deal',h1:'Submit a Financing Request',lead:'Describe your deal. The Pegasus Match Engine surfaces lenders whose appetite aligns. Member-directed — no hard credit pull.',eyebrow:'Growth Partners',
segments:[['🏢','Investment Property','DSCR / Bridge'],['🏗️','Construction','Ground-up / Value-add'],['🔁','Refinance','Cash-out / Rate']],
fields:[[['Loan Type','','select',['DSCR','Bridge','Construction','Permanent']],['Loan Amount','2100000','mono']],[['Property State','','select',['TX','AZ','FL','CO','NY','CA']],['Asset Type','','select',['Multifamily','Mixed-Use','Retail','Office','SFR']]],[['LTV / LTC %','75','mono'],['DSCR','1.35','mono']],[['Timeline','','select',['ASAP','30 days','60 days','90+ days']],['Exit Strategy','','select',['Refinance','Sale','Hold']]],[['Deal Notes','Tell lenders about the opportunity, sponsor experience, and use of funds','area']]],
toast:'Deal submitted',submit:'Run Capital Alignment →'}));

// Real submit handler (was missing — the form silently discarded input). Persists
// to deal_submissions via PegForms.submitDeal, mirroring the other intake pages.
window.pegSubmit=async function(btn){
  var g=function(id){var e=document.getElementById(id);return e?String(e.value||'').trim():'';};
  var loanType=g('f_loan_type'),amount=g('f_loan_amount'),state=g('f_property_state'),
      assetType=g('f_asset_type'),ltv=g('f_ltv_ltc'),notes=g('f_deal_notes');
  var err=document.getElementById('f_err'); if(err)err.textContent='';
  if(!amount.replace(/[^0-9.]/g,'')){ if(err)err.textContent='Please enter a loan amount.'; return; }
  var _t=btn?btn.textContent:''; if(btn){btn.disabled=true;btn.textContent='Submitting…';}
  try{
    await PegForms.submitDeal({dealType:loanType,amount:amount.replace(/[^0-9.]/g,''),state:state,assetType:assetType,ltv:ltv,notes:notes});
    Pegasus.toast('✓','var(--green-dim)','Deal submitted','The Match Engine will surface aligned lenders.');
    if(btn){btn.textContent='Submitted ✓';}
  }catch(e){
    if(err)err.textContent=(e&&e.message)||'Could not submit. Please sign in and try again.';
    if(btn){btn.disabled=false;btn.textContent=_t;}
  }
};
</script></body></html>
